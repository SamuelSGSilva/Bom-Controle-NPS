<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Cliente</title>
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <script src="toast.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: #0a0a0a;
            color: #f1f1f1;
            min-height: 100vh;
        }

        header {
            background: #141414;
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #cc0000;
        }

        header button {
            background: transparent;
            border: 1px solid #cc0000;
            color: #cc0000;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }

        header button:hover {
            background: #cc0000;
            color: #fff;
        }

        nav {
            display: flex;
            gap: 24px;
        }

        nav a {
            color: #888888;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s;
        }

        nav a:hover {
            color: #cc0000;
        }

        nav a.ativo {
            color: #cc0000;
            font-weight: 600;
        }

        main {
            padding: 32px;
            max-width: 550px;
            margin: 40px auto;
            background: #141414;
            border-radius: 12px;
            border-top: 3px solid #cc0000;
        }

        h2 {
            margin-bottom: 24px;
            font-size: 18px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 13px;
            color: #888888;
            margin-bottom: 6px;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            background: #141414;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            color: #f1f1f1;
            font-size: 14px;
            outline: none;
            transition: border 0.2s;
        }

        input:focus {
            border-color: #cc0000;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        button[type="submit"] {
            width: 100%;
            padding: 12px;
            background: #cc0000;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            transition: background 0.2s;
        }

        button[type="submit"]:hover {
            background: #aa0000;
        }

        .tipo-doc-toggle {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        .tipo-doc-btn {
            flex: 1;
            padding: 10px;
            background: #141414;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            color: #888888;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tipo-doc-btn.ativo {
            border-color: #cc0000;
            color: #cc0000;
        }
    </style>
    <link rel="stylesheet" href="responsive.css">
</head>

<body>
    <header>
        <img src="assets/logo.png" style="height: 40px;">
        <nav>
            <a href="dashboard.html">Dashboard</a>
            <a href="clientes.html">Clientes</a>
            <a href="novo-cliente.html" class="ativo">Novo Cliente</a>
            <a href="posvendas.html">Pós-venda</a>
            <a href="relatorios.html">Relatórios</a>
            <a href="avaliacao-completa.html">Avaliações</a>
             <a href="importar.html">Importar</a>
        </nav>
        <button onclick="logout()">Sair</button>
    </header>

    <main>
        <h2>Novo Cliente</h2>
        <form id="form-cliente">
            <div class="form-group">
                <label>Nome completo</label>
                <input type="text" id="nome" required>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>E-mail</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label>Telefone</label>
                    <input type="text" id="telefone">
                </div>
            </div>
            <div class="form-group">
                <label>Tipo de documento</label>
                <div class="tipo-doc-toggle">
                    <button type="button" class="tipo-doc-btn ativo" data-tipo="cpf">CPF</button>
                    <button type="button" class="tipo-doc-btn" data-tipo="cnpj">CNPJ</button>
                </div>
            </div>
            <div class="form-group" id="grupo-cpf">
                <label>CPF</label>
                <input type="text" id="cpf">
            </div>
            <div class="form-group" id="grupo-cnpj" style="display: none;">
                <label>CNPJ</label>
                <input type="text" id="cnpj">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>CEP</label>
                    <input type="text" id="cep">
                </div>
                <div class="form-group">
                    <label>Número</label>
                    <input type="text" id="numero">
                </div>
            </div>
            <div class="form-group">
                <label>Logradouro</label>
                <input type="text" id="logradouro">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Bairro</label>
                    <input type="text" id="bairro">
                </div>
                <div class="form-group">
                    <label>Cidade</label>
                    <input type="text" id="cidade">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Estado</label>
                    <input type="text" id="estado">
                </div>
                <div class="form-group">
                    <label>Data de Nascimento</label>
                    <input type="date" id="data_nascimento">
                </div>
            </div>
            <button type="submit">Cadastrar Cliente</button>
        </form>
    </main>

    <script>
        const token = localStorage.getItem('token');
        if (!token) window.location.href = 'index.html';

        // Busca CEP automaticamente
        document.getElementById('cep').addEventListener('blur', async function () {
            const cep = this.value.replace(/\D/g, '');
            if (cep.length !== 8) return;

            const response = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
            const data = await response.json();

            if (!data.erro) {
                document.getElementById('logradouro').value = data.logradouro;
                document.getElementById('bairro').value = data.bairro;
                document.getElementById('cidade').value = data.localidade;
                document.getElementById('estado').value = data.uf;
            }
        });

        // Alterna entre CPF e CNPJ
        document.querySelectorAll('.tipo-doc-btn').forEach(function (btn) {
            btn.addEventListener('click', function () {
                document.querySelectorAll('.tipo-doc-btn').forEach(b => b.classList.remove('ativo'));
                btn.classList.add('ativo');
                document.getElementById('grupo-cpf').style.display = btn.dataset.tipo === 'cpf' ? 'block' : 'none';
                document.getElementById('grupo-cnpj').style.display = btn.dataset.tipo === 'cnpj' ? 'block' : 'none';
            });
        });

        // Envia formulário
        document.getElementById('form-cliente').addEventListener('submit', async function (e) {
            e.preventDefault();

            const cpf = document.getElementById('cpf').value;
            const cnpj = document.getElementById('cnpj').value;

            if (cpf && !validarCPF(cpf)) {
                toast('CPF inválido!', 'aviso');
                return;
            }

            if (cnpj && !validarCNPJ(cnpj)) {
               toast('CNPJ inválido!', 'aviso');
                return;
            }

            const cliente = {
                nome: document.getElementById('nome').value,
                email: document.getElementById('email').value,
                telefone: document.getElementById('telefone').value,
                cpf: document.getElementById('cpf').value || null,
                cnpj: document.getElementById('cnpj').value || null,
                cep: document.getElementById('cep').value,
                logradouro: document.getElementById('logradouro').value,
                numero: document.getElementById('numero').value,
                bairro: document.getElementById('bairro').value,
                cidade: document.getElementById('cidade').value,
                estado: document.getElementById('estado').value,
                data_nascimento: document.getElementById('data_nascimento').value || null
            };

            const response = await fetch('/clientes', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify(cliente)
            });

            if (response.ok) {
                toast('Cliente cadastrado com sucesso!');
                window.location.href = 'clientes.html';
            } else {
                toast('Erro ao cadastrar cliente!', 'erro');
            }
        });

        function validarCPF(cpf) {
            cpf = cpf.replace(/\D/g, '');
            if (cpf.length !== 11 || /^(\d)\1+$/.test(cpf)) return false;

            let soma = 0;
            for (let i = 0; i < 9; i++) soma += parseInt(cpf[i]) * (10 - i);
            let resto = (soma * 10) % 11;
            if (resto === 10 || resto === 11) resto = 0;
            if (resto !== parseInt(cpf[9])) return false;

            soma = 0;
            for (let i = 0; i < 10; i++) soma += parseInt(cpf[i]) * (11 - i);
            resto = (soma * 10) % 11;
            if (resto === 10 || resto === 11) resto = 0;
            return resto === parseInt(cpf[10]);
        }

        function validarCNPJ(cnpj) {
            cnpj = cnpj.replace(/\D/g, '');
            if (cnpj.length !== 14 || /^(\d)\1+$/.test(cnpj)) return false;

            let tamanho = cnpj.length - 2;
            let numeros = cnpj.substring(0, tamanho);
            const digitos = cnpj.substring(tamanho);
            let soma = 0, pos = tamanho - 7;

            for (let i = tamanho; i >= 1; i--) {
                soma += parseInt(numeros.charAt(tamanho - i)) * pos--;
                if (pos < 2) pos = 9;
            }
            let resultado = soma % 11 < 2 ? 0 : 11 - (soma % 11);
            if (resultado !== parseInt(digitos.charAt(0))) return false;

            tamanho++;
            numeros = cnpj.substring(0, tamanho);
            soma = 0; pos = tamanho - 7;
            for (let i = tamanho; i >= 1; i--) {
                soma += parseInt(numeros.charAt(tamanho - i)) * pos--;
                if (pos < 2) pos = 9;
            }
            resultado = soma % 11 < 2 ? 0 : 11 - (soma % 11);
            return resultado === parseInt(digitos.charAt(1));
        }

        function logout() {
            localStorage.removeItem('token');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
