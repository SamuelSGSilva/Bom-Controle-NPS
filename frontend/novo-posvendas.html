<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Pós-Vendas</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="responsive.css">
    <script src="toast.js"></script>
    <script src="navbar.js" defer></script>
</head>

<body>


    <main class="form-card">
        <h2>Novo Pós-Vendas</h2>
        <form id="form-posvendas">
            <div class="form-group">
                <div class="label-header">
                    <label style="margin-bottom: 0;">Nome do Cliente</label>
                    <button type="button" class="btn-link-add" onclick="abrirModalNovoCliente()">+ Cadastrar sem Bom Controle</button>
                </div>
                <div class="autocomplete-wrapper">
                    <input type="text" id="cliente_nome" placeholder="Digite o nome do cliente" required autocomplete="off">
                    <div class="autocomplete-lista" id="lista-sugestoes"></div>
                </div>
                <div class="cliente-info" id="cliente-info"></div>
            </div>
            <div class="form-group">
                <label>Feedback</label>
                <input type="text" id="feedback">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Status</label>
                    <select id="status">
                        <option value="pendente">Pendente</option>
                        <option value="em andamento">Em Andamento</option>
                        <option value="concluido">Concluído</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Data de Retorno</label>
                    <input type="date" id="data_retorno">
                </div>
            </div>
            <button type="submit">Cadastrar Pós-Venda</button>
        </form>
    </main>

    <!-- Modal Novo Cliente Sem Bom Controle -->
    <div class="modal-fundo" id="modal-novo-cliente">
        <div class="modal-caixa">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                <h3 style="font-size: 16px; color: #fff;">Cadastrar Cliente (Sem Bom Controle)</h3>
                <button type="button" onclick="fecharModalNovoCliente()" style="background:none; border:none; color:#888; font-size:20px; cursor:pointer;">&times;</button>
            </div>
            <form id="form-quick-cliente">
                <div class="form-group">
                    <label>Nome Completo *</label>
                    <input type="text" id="mc_nome" required placeholder="Nome do cliente">
                </div>
                <div class="form-group">
                    <label>E-mail *</label>
                    <input type="email" id="mc_email" required placeholder="cliente@exemplo.com">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Telefone</label>
                        <input type="text" id="mc_telefone" placeholder="(00) 00000-0000">
                    </div>
                    <div class="form-group">
                        <label>CPF / CNPJ</label>
                        <input type="text" id="mc_doc" placeholder="CPF ou CNPJ">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Cidade</label>
                        <input type="text" id="mc_cidade" placeholder="Cidade">
                    </div>
                    <div class="form-group">
                        <label>Estado (UF)</label>
                        <input type="text" id="mc_estado" maxlength="2" placeholder="UF">
                    </div>
                </div>
                <div style="display: flex; gap: 12px; margin-top: 20px;">
                    <button type="button" onclick="fecharModalNovoCliente()" style="flex: 1; padding: 12px; background: transparent; border: 1px solid #2a2a2a; border-radius: 8px; color: #ccc; cursor: pointer;">Cancelar</button>
                    <button type="submit" style="flex: 1; margin-top: 0;">Salvar e Selecionar</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        if (!token) window.location.href = 'index.html';

        let clienteEncontrado = null;
        let clientesDisponiveis = [];
        let sugestoesAtuais = [];
        let indiceAtivo = -1;

        const inputNome = document.getElementById('cliente_nome');
        const clienteInfo = document.getElementById('cliente-info');
        const listaSugestoes = document.getElementById('lista-sugestoes');

        async function carregarClientes() {
            const response = await fetch('/clientes', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            clientesDisponiveis = await response.json();
        }

        function selecionarCliente(cliente) {
            clienteEncontrado = cliente;
            inputNome.value = cliente.nome;
            clienteInfo.innerHTML = `<strong>${cliente.nome}</strong><br>${cliente.email || '--'} · ${cliente.telefone || '--'}`;
            clienteInfo.style.display = 'block';
            esconderSugestoes();
        }

        function esconderSugestoes() {
            listaSugestoes.style.display = 'none';
            listaSugestoes.innerHTML = '';
            sugestoesAtuais = [];
            indiceAtivo = -1;
        }

        function renderizarSugestoes(texto) {
            sugestoesAtuais = clientesDisponiveis
                .filter(c => c.nome.toLowerCase().includes(texto.toLowerCase()))
                .slice(0, 8);
            indiceAtivo = -1;

            let html = sugestoesAtuais.map((c, i) => `
                <div class="autocomplete-item" data-indice="${i}">
                    ${c.nome}
                    <span>${c.email || ''}</span>
                </div>
            `).join('');

            html += `
                <div class="autocomplete-item autocomplete-item-add" id="btn-add-sugestao">
                    + Cadastrar "${texto}" sem Bom Controle
                </div>
            `;

            listaSugestoes.innerHTML = html;
            listaSugestoes.style.display = 'block';

            listaSugestoes.querySelectorAll('.autocomplete-item:not(.autocomplete-item-add)').forEach(item => {
                item.addEventListener('mousedown', function (e) {
                    e.preventDefault();
                    selecionarCliente(sugestoesAtuais[Number(item.dataset.indice)]);
                });
            });

            const btnAdd = document.getElementById('btn-add-sugestao');
            if (btnAdd) {
                btnAdd.addEventListener('mousedown', function (e) {
                    e.preventDefault();
                    abrirModalNovoCliente(texto);
                });
            }
        }

        function destacarSugestao() {
            listaSugestoes.querySelectorAll('.autocomplete-item').forEach((item, i) => {
                item.classList.toggle('ativo', i === indiceAtivo);
            });
        }

        inputNome.addEventListener('input', function () {
            clienteEncontrado = null;
            clienteInfo.style.display = 'none';

            const texto = inputNome.value.trim();
            if (!texto) {
                esconderSugestoes();
                return;
            }
            renderizarSugestoes(texto);
        });

        inputNome.addEventListener('focus', function () {
            if (inputNome.value.trim()) {
                renderizarSugestoes(inputNome.value.trim());
            }
        });

        inputNome.addEventListener('keydown', function (e) {
            if (sugestoesAtuais.length === 0) return;

            if (e.key === 'ArrowDown') {
                e.preventDefault();
                indiceAtivo = Math.min(indiceAtivo + 1, sugestoesAtuais.length - 1);
                destacarSugestao();
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                indiceAtivo = Math.max(indiceAtivo - 1, 0);
                destacarSugestao();
            } else if (e.key === 'Enter') {
                e.preventDefault();
                const escolhido = indiceAtivo >= 0 ? sugestoesAtuais[indiceAtivo] : sugestoesAtuais[0];
                if (escolhido) selecionarCliente(escolhido);
            } else if (e.key === 'Escape') {
                esconderSugestoes();
            }
        });

        inputNome.addEventListener('blur', function () {
            esconderSugestoes();
        });

        function abrirModalNovoCliente(nomeInicial = '') {
            document.getElementById('mc_nome').value = nomeInicial || inputNome.value.trim();
            document.getElementById('mc_email').value = '';
            document.getElementById('mc_telefone').value = '';
            document.getElementById('mc_doc').value = '';
            document.getElementById('mc_cidade').value = '';
            document.getElementById('mc_estado').value = '';
            esconderSugestoes();
            document.getElementById('modal-novo-cliente').classList.add('ativo');
        }

        function fecharModalNovoCliente() {
            document.getElementById('modal-novo-cliente').classList.remove('ativo');
        }

        document.getElementById('form-quick-cliente').addEventListener('submit', async function (e) {
            e.preventDefault();
            const doc = document.getElementById('mc_doc').value.trim();
            const docLimpo = doc.replace(/\D/g, '');
            let cpf = null;
            let cnpj = null;
            if (docLimpo.length === 11) cpf = doc;
            else if (docLimpo.length === 14) cnpj = doc;

            const novoCliente = {
                nome: document.getElementById('mc_nome').value.trim(),
                email: document.getElementById('mc_email').value.trim(),
                telefone: document.getElementById('mc_telefone').value.trim() || null,
                cpf: cpf,
                cnpj: cnpj,
                cidade: document.getElementById('mc_cidade').value.trim() || null,
                estado: document.getElementById('mc_estado').value.trim() || null
            };

            try {
                const res = await fetch('/clientes', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(novoCliente)
                });

                if (res.ok) {
                    const clienteCriado = await res.json();
                    toast('Cliente cadastrado com sucesso!');
                    clientesDisponiveis.push(clienteCriado);
                    selecionarCliente(clienteCriado);
                    fecharModalNovoCliente();
                } else {
                    const errData = await res.json().catch(() => ({}));
                    const msg = errData.detail || 'Erro ao cadastrar cliente. Verifique se o e-mail já está cadastrado.';
                    toast(msg, 'erro');
                }
            } catch (err) {
                toast('Erro de conexão ao cadastrar cliente!', 'erro');
            }
        });

        carregarClientes();

        document.getElementById('form-posvendas').addEventListener('submit', async function (e) {
            e.preventDefault();

            if (!clienteEncontrado) {
                toast('Selecione um cliente na lista de sugestões!', 'erro');
                return;
            }

            const posVenda = {
                cliente_id: clienteEncontrado.id,
                feedback: document.getElementById('feedback').value || null,
                status: document.getElementById('status').value,
                data_retorno: document.getElementById('data_retorno').value || null
            };

            const response = await fetch('/pos-venda', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify(posVenda)
            });

            if (response.ok) {
                toast('Pós-venda cadastrado com sucesso!');
                window.location.href = 'posvendas.html';
            } else {
                toast('Erro ao cadastrar pós-venda!', 'erro');
            }
        });

        function logout() {
            localStorage.removeItem('token');
            window.location.href = 'index.html';
        }
    </script>
</body>

</html>
