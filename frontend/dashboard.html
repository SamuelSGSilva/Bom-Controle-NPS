<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="responsive.css">
    <script src="toast.js"></script>
    <script src="navbar.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

    <main>
        <div style="margin-bottom: 28px;">
            <h2 id="boas-vindas" style="font-size: 20px; font-weight: 700; color: #ffffff; letter-spacing: -0.3px;">Olá! 👋</h2>
            <p style="color: #666670; font-size: 14px; margin-top: 4px;">Aqui está o resumo do dia.</p>
        </div>

        <div class="cards">
            <div class="card">
                <h3>Índice NPS</h3>
                <p id="nps-score">--</p>
            </div>
            <div class="card">
                <h3>Clientes Satisfeitos</h3>
                <p id="promotores">--</p>
            </div>
            <div class="card">
                <h3>Clientes Indiferentes</h3>
                <p id="neutros">--</p>
            </div>
            <div class="card">
                <h3>Clientes Insatisfeitos</h3>
                <p id="detratores">--</p>
            </div>
            <div class="card">
                <h3>Total de Avaliações</h3>
                <p id="total">--</p>
            </div>
            <div class="card">
                <h3>Total de Clientes</h3>
                <p id="total-clientes">--</p>
            </div>
            <div class="card">
                <h3>Pós-vendas Pendentes</h3>
                <p id="posvendas-pendentes">--</p>
            </div>
        </div>

        <div class="chart-card" style="margin-top: 32px;">
            <div class="chart-card-title">Evolução do NPS</div>
            <div style="height: 180px;"><canvas id="grafico-evolucao"></canvas></div>
        </div>

        <div class="grid-2col" style="display: grid; gap: 24px; margin-top: 24px;">

            <div class="chart-card">
                <div class="chart-card-title">Distribuição NPS</div>
                <div style="height: 190px;"><canvas id="grafico-nps"></canvas></div>
            </div>

            <div class="chart-card" style="overflow-x: auto;">
                <div class="chart-card-title">Últimas Avaliações</div>
                <table style="width: 100%; min-width: 320px; border-collapse: collapse;">
                    <thead>
                        <tr>
                            <th style="background: transparent; color: #555560; font-size: 11px; text-align: left; padding: 0 8px 12px; border-bottom: 1px solid rgba(255,255,255,0.08); text-transform: uppercase; letter-spacing: 1px; font-weight: 700;">Cliente</th>
                            <th style="background: transparent; color: #555560; font-size: 11px; text-align: left; padding: 0 8px 12px; border-bottom: 1px solid rgba(255,255,255,0.08); text-transform: uppercase; letter-spacing: 1px; font-weight: 700;">Nota</th>
                            <th style="background: transparent; color: #555560; font-size: 11px; text-align: left; padding: 0 8px 12px; border-bottom: 1px solid rgba(255,255,255,0.08); text-transform: uppercase; letter-spacing: 1px; font-weight: 700;">Data</th>
                            <th style="background: transparent; color: #555560; font-size: 11px; text-align: left; padding: 0 8px 12px; border-bottom: 1px solid rgba(255,255,255,0.08); text-transform: uppercase; letter-spacing: 1px; font-weight: 700;">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabela-ultimas-avaliacoes"></tbody>
                </table>
            </div>

        </div>
    </main>

    <script>
        const token = localStorage.getItem('token');
        if (!token) window.location.href = 'index.html';

        function dataLocal(isoSemFuso) {
            return new Date(isoSemFuso.endsWith('Z') ? isoSemFuso : isoSemFuso + 'Z');
        }

        async function carregarNPS() {
            const response = await fetch('/avaliacoes/relatorio/nps', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await response.json();

            if (data.message) {
                document.getElementById('nps-score').textContent = '--';
                document.getElementById('promotores').textContent = '--';
                document.getElementById('neutros').textContent = '--';
                document.getElementById('detratores').textContent = '--';
                document.getElementById('total').textContent = '0';
                return;
            }

            document.getElementById('nps-score').textContent = data.nps + '%';
            document.getElementById('promotores').textContent = data.promotores;
            document.getElementById('neutros').textContent = data.neutros;
            document.getElementById('detratores').textContent = data.detratores;
            document.getElementById('total').textContent = data.total_avaliacoes;

            renderizarGrafico(data.promotores, data.neutros, data.detratores);
        }

        async function carregarResumo() {
            const resClientes = await fetch('/clientes', {
                headers: { 'Authorization': `Bearer ${token}` }
            });

            const username = localStorage.getItem('username');
            document.getElementById('boas-vindas').textContent = `Olá, ${username}! 👋`;

            const clientes = await resClientes.json();
            document.getElementById('total-clientes').textContent = clientes.length;

            const resPosVendas = await fetch('/pos-venda', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const posvendas = await resPosVendas.json();
            const pendentes = posvendas.filter(pv => pv.status === 'pendente').length;
            document.getElementById('posvendas-pendentes').textContent = pendentes;
        }

        async function carregarUltimasAvaliacoes() {
            const [resNPS, resCli] = await Promise.all([
                fetch('/avaliacoes', { headers: { 'Authorization': `Bearer ${token}` } }),
                fetch('/clientes', { headers: { 'Authorization': `Bearer ${token}` } })
            ]);

            const avaliacoes = await resNPS.json();
            const clientes = await resCli.json();
            const tabela = document.getElementById('tabela-ultimas-avaliacoes');
            tabela.innerHTML = '';

            if (!avaliacoes.length) {
                tabela.innerHTML = '<tr><td colspan="4" style="color:#666; text-align:center; padding:24px; font-size:13px;">Nenhuma avaliação registrada</td></tr>';
                return;
            }

            const ultimas = avaliacoes.slice(-5).reverse();
            ultimas.forEach(a => {
                const cliente = clientes.find(c => c.id === a.cliente_id);
                const nome = cliente ? cliente.nome : `ID ${a.cliente_id}`;
                const temNota = a.nps_score !== null && a.nps_score !== undefined;
                const tipo = !temNota ? 'semnota' : a.nps_score === 5 ? 'promotor' : a.nps_score === 4 ? 'neutro' : 'detrator';
                const nota = temNota ? `${a.nps_score}/5` : '--';
                tabela.innerHTML += `
            <tr style="border-bottom: 1px solid rgba(255,255,255,0.05);">
                <td style="padding: 12px 8px; font-size: 13px; color: #d0d0d8;">${nome}</td>
                <td style="padding: 12px 8px;"><span class="nota-badge nota-${tipo}">${nota}</span></td>
                <td style="padding: 12px 8px; font-size: 12px; color: #666670;">${dataLocal(a.created_at).toLocaleDateString('pt-BR')}</td>
                <td style="padding: 12px 8px;">
                    <button class="btn-deletar" onclick="excluirAvaliacao(${a.id})">Excluir</button>
                </td>
            </tr>`;
            });
        }

        async function excluirAvaliacao(id) {
            if (!confirm('Tem certeza que deseja excluir esta avaliação?')) return;

            const response = await fetch(`/avaliacoes/${id}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${token}` }
            });

            if (response.ok) {
                toast('Avaliação excluída com sucesso!');
                await carregarNPS();
                await carregarUltimasAvaliacoes();
            } else {
                toast('Erro ao excluir avaliação!', 'erro');
            }
        }

        if (window.Chart) { Chart.defaults.font.size = 11; Chart.defaults.color = '#8b8b93'; }

        function renderizarGrafico(promotores, neutros, detratores) {
            const ctx = document.getElementById('grafico-nps').getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Satisfeitos', 'Indiferentes', 'Insatisfeitos'],
                    datasets: [{
                        data: [promotores, neutros, detratores],
                        backgroundColor: [
                            'rgba(34,197,94,0.85)',
                            'rgba(245,158,11,0.85)',
                            'rgba(248,113,113,0.85)'
                        ],
                        borderRadius: 8,
                        borderSkipped: false,
                        maxBarThickness: 90,
                        categoryPercentage: 0.7,
                        barPercentage: 0.9,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        x: {
                            ticks: { color: '#666670' },
                            grid: { color: 'rgba(255,255,255,0.04)' }
                        },
                        y: {
                            ticks: { color: '#666670', stepSize: 1 },
                            grid: { color: 'rgba(255,255,255,0.04)' },
                            beginAtZero: true
                        }
                    }
                }
            });
        }

        async function carregarEvolucaoNPS() {
            const response = await fetch('/avaliacoes/relatorio/evolucao', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await response.json();

            if (data.message || !data.evolucao || !data.evolucao.length) return;

            const meses = { '01': 'Jan', '02': 'Fev', '03': 'Mar', '04': 'Abr', '05': 'Mai', '06': 'Jun', '07': 'Jul', '08': 'Ago', '09': 'Set', '10': 'Out', '11': 'Nov', '12': 'Dez' };
            const labels = data.evolucao.map(item => {
                const [ano, mes] = item.mes.split('-');
                return `${meses[mes]}/${ano.slice(2)}`;
            });
            const valores = data.evolucao.map(item => item.nps);

            const ctx = document.getElementById('grafico-evolucao').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels,
                    datasets: [{
                        label: 'NPS',
                        data: valores,
                        borderColor: '#cc0000',
                        backgroundColor: 'rgba(204, 0, 0, 0.10)',
                        fill: true,
                        tension: 0.4,
                        pointBackgroundColor: '#cc0000',
                        pointBorderColor: '#191920',
                        pointBorderWidth: 2,
                        pointRadius: 5
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        x: {
                            ticks: { color: '#666670' },
                            grid: { color: 'rgba(255,255,255,0.04)' }
                        },
                        y: {
                            ticks: { color: '#666670' },
                            grid: { color: 'rgba(255,255,255,0.04)' },
                            suggestedMin: -100,
                            suggestedMax: 100
                        }
                    }
                }
            });
        }

        function logout() {
            localStorage.removeItem('token');
            window.location.href = 'index.html';
        }

        carregarNPS();
        carregarResumo();
        carregarUltimasAvaliacoes();
        carregarEvolucaoNPS();
    </script>
</body>

</html>
