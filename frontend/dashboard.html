<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="responsive.css">
    <script src="toast.js"></script>
    <script src="navbar.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>


    <main>
        <div style="margin-bottom: 24px;">
            <h2 id="boas-vindas" style="font-size: 18px; color: #ffffff;">Olá! 👋</h2>
            <p style="color: #888888; font-size: 14px;">Aqui está o resumo do dia.</p>
        </div>
        <div class="cards">
            <div class="card">
                <h3>Índice NPS</h3>
                <p id="nps-score">--</p>
            </div>
            <div class="card">
                <h3>Clientes Satisfeitos</h3>
                <p id="promotores">--</p>
            </div>
            <div class="card">
                <h3>Clientes Indiferentes</h3>
                <p id="neutros">--</p>
            </div>
            <div class="card">
                <h3>Clientes Insatisfeitos</h3>
                <p id="detratores">--</p>
            </div>
            <div class="card">
                <h3>Total de Avaliações</h3>
                <p id="total">--</p>
            </div>
            <div class="card">
                <h3>Total de Clientes</h3>
                <p id="total-clientes">--</p>
            </div>
            <div class="card">
                <h3>Pós-vendas Pendentes</h3>
                <p id="posvendas-pendentes">--</p>
            </div>
        </div>

        <div style="background: #141414; border-radius: 12px; padding: 24px; margin-top: 40px;">
            <h3
                style="color: #888888; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 16px;">
                Evolução do NPS
            </h3>
            <div style="height: 180px;"><canvas id="grafico-evolucao"></canvas></div>
        </div>

        <div class="grid-2col" style="display: grid; gap: 24px; margin-top: 24px;">

            <div style="background: #141414; border-radius: 12px; padding: 24px;">
                <h3
                    style="color: #888888; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 16px;">
                    Distribuição NPS
                </h3>
                <div style="height: 190px;"><canvas id="grafico-nps"></canvas></div>
            </div>

            <div style="background: #141414; border-radius: 12px; padding: 24px; overflow-x: auto;">
                <h3
                    style="color: #888888; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 16px;">
                    Últimas Avaliações
                </h3>
                <table style="width: 100%; min-width: 320px; border-collapse: collapse;">
                    <thead>
                        <tr>
                            <th
                                style="color: #888888; font-size: 12px; text-align: left; padding: 8px; border-bottom: 1px solid #2a2a2a;">
                                Cliente</th>
                            <th
                                style="color: #888888; font-size: 12px; text-align: left; padding: 8px; border-bottom: 1px solid #2a2a2a;">
                                Nota</th>
                            <th
                                style="color: #888888; font-size: 12px; text-align: left; padding: 8px; border-bottom: 1px solid #2a2a2a;">
                                Data</th>
                            <th
                                style="color: #888888; font-size: 12px; text-align: left; padding: 8px; border-bottom: 1px solid #2a2a2a;">
                                Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabela-ultimas-avaliacoes"></tbody>
                </table>
            </div>

        </div>
    </main>


    <script>
        const token = localStorage.getItem('token');
        if (!token) window.location.href = 'index.html';

        // O backend grava created_at em UTC sem indicar o fuso na string ISO;
        // sem o "Z" o navegador interpreta como horário local, adiantando o valor.
        function dataLocal(isoSemFuso) {
            return new Date(isoSemFuso.endsWith('Z') ? isoSemFuso : isoSemFuso + 'Z');
        }

        async function carregarNPS() {
            const response = await fetch('/avaliacoes/relatorio/nps', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await response.json();

            if (data.message) {
                document.getElementById('nps-score').textContent = '--';
                document.getElementById('promotores').textContent = '--';
                document.getElementById('neutros').textContent = '--';
                document.getElementById('detratores').textContent = '--';
                document.getElementById('total').textContent = '0';
                return;
            }

            document.getElementById('nps-score').textContent = data.nps + '%';
            document.getElementById('promotores').textContent = data.promotores;
            document.getElementById('neutros').textContent = data.neutros;
            document.getElementById('detratores').textContent = data.detratores;
            document.getElementById('total').textContent = data.total_avaliacoes;

            renderizarGrafico(data.promotores, data.neutros, data.detratores);

        }

        async function carregarResumo() {
            const resClientes = await fetch('/clientes', {
                headers: { 'Authorization': `Bearer ${token}` }
            });

            const username = localStorage.getItem('username');
            document.getElementById('boas-vindas').textContent = `Olá, ${username}! 👋`;

            const clientes = await resClientes.json();
            document.getElementById('total-clientes').textContent = clientes.length;

            const resPosVendas = await fetch('/pos-venda', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const posvendas = await resPosVendas.json();
            const pendentes = posvendas.filter(pv => pv.status === 'pendente').length;
            document.getElementById('posvendas-pendentes').textContent = pendentes;
        }

        async function carregarUltimasAvaliacoes() {
            const [resNPS, resCli] = await Promise.all([
                fetch('/avaliacoes', { headers: { 'Authorization': `Bearer ${token}` } }),
                fetch('/clientes', { headers: { 'Authorization': `Bearer ${token}` } })
            ]);

            const avaliacoes = await resNPS.json();
            const clientes = await resCli.json();
            const tabela = document.getElementById('tabela-ultimas-avaliacoes');
            tabela.innerHTML = '';

            if (!avaliacoes.length) {
                tabela.innerHTML = '<tr><td colspan="4" style="color:#888; text-align:center; padding:20px;">Nenhuma avaliação</td></tr>';
                return;
            }

            const ultimas = avaliacoes.slice(-5).reverse();
            ultimas.forEach(a => {
                const cliente = clientes.find(c => c.id === a.cliente_id);
                const nome = cliente ? cliente.nome : `ID ${a.cliente_id}`;
                const cores = { promotor: '#00cc66', neutro: '#f59e0b', detrator: '#cc0000', semnota: '#888888' };
                const temNota = a.nps_score !== null && a.nps_score !== undefined;
                const tipo = !temNota ? 'semnota' : a.nps_score === 5 ? 'promotor' : a.nps_score === 4 ? 'neutro' : 'detrator';
                const nota = temNota ? `${a.nps_score}/5` : '--';
                tabela.innerHTML += `
            <tr style="border-bottom: 1px solid #2a2a2a;">
                <td style="padding: 10px 8px; font-size: 13px; color: #cccccc;">${nome}</td>
                <td style="padding: 10px 8px;"><span style="color: ${cores[tipo]}; font-weight: 700;">${nota}</span></td>
                <td style="padding: 10px 8px; font-size: 12px; color: #888888;">${dataLocal(a.created_at).toLocaleDateString('pt-BR')}</td>
                <td style="padding: 10px 8px;">
                    <button class="btn-deletar" onclick="excluirAvaliacao(${a.id})">Excluir</button>
                </td>
            </tr>`;
            });
        }

        async function excluirAvaliacao(id) {
            if (!confirm('Tem certeza que deseja excluir esta avaliação?')) return;

            const response = await fetch(`/avaliacoes/${id}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${token}` }
            });

            if (response.ok) {
                toast('Avaliação excluída com sucesso!');
                await carregarNPS();
                await carregarUltimasAvaliacoes();
            } else {
                toast('Erro ao excluir avaliação!', 'erro');
            }
        }

        if (window.Chart) { Chart.defaults.font.size = 11; Chart.defaults.color = '#8b8b93'; }

        function renderizarGrafico(promotores, neutros, detratores) {
            const ctx = document.getElementById('grafico-nps').getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Satisfeitos', 'Indiferentes', 'Insatisfeitos'],
                    datasets: [{
                        data: [promotores, neutros, detratores],
                        backgroundColor: ['#00cc66', '#f59e0b', '#cc0000'],
                        borderRadius: 6,
                        borderSkipped: false,
                        maxBarThickness: 90,
                        categoryPercentage: 0.7,
                        barPercentage: 0.9,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        x: {
                            ticks: { color: '#888888' },
                            grid: { color: '#1a1a1a' }
                        },
                        y: {
                            ticks: {
                                color: '#888888',
                                stepSize: 1
                            },
                            grid: { color: '#1a1a1a' },
                            beginAtZero: true
                        }
                    }
                }
            });
        }

        async function carregarEvolucaoNPS() {
            const response = await fetch('/avaliacoes/relatorio/evolucao', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await response.json();

            if (data.message || !data.evolucao || !data.evolucao.length) return;

            const meses = { '01': 'Jan', '02': 'Fev', '03': 'Mar', '04': 'Abr', '05': 'Mai', '06': 'Jun', '07': 'Jul', '08': 'Ago', '09': 'Set', '10': 'Out', '11': 'Nov', '12': 'Dez' };
            const labels = data.evolucao.map(item => {
                const [ano, mes] = item.mes.split('-');
                return `${meses[mes]}/${ano.slice(2)}`;
            });
            const valores = data.evolucao.map(item => item.nps);

            const ctx = document.getElementById('grafico-evolucao').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels,
                    datasets: [{
                        label: 'NPS',
                        data: valores,
                        borderColor: '#cc0000',
                        backgroundColor: 'rgba(204, 0, 0, 0.15)',
                        fill: true,
                        tension: 0.3,
                        pointBackgroundColor: '#cc0000',
                        pointRadius: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        x: {
                            ticks: { color: '#888888' },
                            grid: { color: '#1a1a1a' }
                        },
                        y: {
                            ticks: { color: '#888888' },
                            grid: { color: '#1a1a1a' },
                            suggestedMin: -100,
                            suggestedMax: 100
                        }
                    }
                }
            });
        }

        function logout() {
            localStorage.removeItem('token');
            window.location.href = 'index.html';
        }

        carregarNPS();
        carregarResumo();
        carregarUltimasAvaliacoes();
        carregarEvolucaoNPS();
    </script>
</body>

</html>
