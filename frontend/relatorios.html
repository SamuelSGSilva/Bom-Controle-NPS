<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatório</title>
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <script src="toast.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: #0a0a0a;
            color: #f1f1f1;
            min-height: 100vh;
        }

        header {
            background: #141414;
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #cc0000;
        }

        header button {
            background: transparent;
            border: 1px solid #cc0000;
            color: #cc0000;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }

        header button:hover {
            background: #cc0000;
            color: #fff;
        }

        nav {
            display: flex;
            gap: 24px;
        }

        nav a {
            color: #888888;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s;
        }

        nav a:hover {
            color: #cc0000;
        }

        nav a.ativo {
            color: #cc0000;
            font-weight: 600;
        }

        main {
            padding: 32px;
        }

        h2 {
            margin-bottom: 20px;
            font-size: 18px;
            color: #ffffff;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        .card {
            background: #141414;
            border-radius: 12px;
            padding: 24px;
            border-left: 4px solid #cc0000;
            text-align: center;
        }

        .card h3 {
            color: #888888;
            font-size: 13px;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .card p {
            color: #ffffff;
            font-size: 36px;
            font-weight: 700;
        }

        .busca {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-bottom: 24px;
        }

        .busca input {
            padding: 12px 16px;
            background: #141414;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            color: #f1f1f1;
            font-size: 14px;
            outline: none;
            width: 250px;
        }

        .busca input:focus {
            border-color: #cc0000;
        }

        .busca button {
            padding: 12px 20px;
            background: #cc0000;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: background 0.2s;
        }

        .busca button:hover {
            background: #aa0000;
        }

        .historico {
            background: #141414;
            border-radius: 12px;
            padding: 24px;
            border-left: 4px solid #cc0000;
        }

        .historico h3 {
            color: #cc0000;
            margin-bottom: 16px;
        }

        .historico p {
            color: #cccccc;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .historico span {
            color: #ffffff;
            font-weight: 600;
        }
    </style>
</head>

<body>
    <header>
        <img src="assets/logo.png" style="height: 40px;">
        <nav>
            <a href="dashboard.html">Dashboard</a>
            <a href="clientes.html">Clientes</a>
            <a href="posvendas.html">Pós-venda</a>
            <a href="relatorios.html" class="ativo">Relatórios</a>
        </nav>
        <button onclick="logout()">Sair</button>
    </header>

    <main>
        <h2>Relatórios NPS</h2>

        <div class="cards">
            <div class="card">
                <h3>Índice NPS</h3>
                <p id="nps-score">--</p>
            </div>
            <div class="card">
                <h3>Clientes Satisfeitos</h3>
                <p id="promotores">--</p>
            </div>
            <div class="card">
                <h3>Clientes Indiferentes</h3>
                <p id="neutros">--</p>
            </div>
            <div class="card">
                <h3>Clientes Insatisfeitos</h3>
                <p id="detratores">--</p>
            </div>
            <div class="card">
                <h3>Total de Respostas</h3>
                <p id="total">--</p>
            </div>
            <div class="card">
            <h3>Zona NPS</h3>
            <p id="classificacao" style="font-size: 20px;">--</p>
        </div>
        </div>

        <h2>Histórico do Cliente</h2>
        <div class="busca">
            <input type="number" id="cliente-id" placeholder="Digite o ID do cliente">
            <button onclick="buscarHistorico()">Buscar</button>
        </div>

        <div class="historico" id="historico" style="display:none"></div>
    </main>

    <script>
        const token = localStorage.getItem('token');
        if (!token) window.location.href = 'index.html';

        async function carregarNPS() {
            const response = await fetch('http://localhost:8000/relatorios/nps', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await response.json();

            if (data.message) {
                document.getElementById('nps-score').textContent = '--';
                document.getElementById('promotores').textContent = '--';
                document.getElementById('neutros').textContent = '--';
                document.getElementById('detratores').textContent = '--';
                document.getElementById('total').textContent = '0';
                return;
            }

            document.getElementById('nps-score').textContent = data.nps + '%';
            document.getElementById('promotores').textContent = data.promotores;
            document.getElementById('neutros').textContent = data.neutros;
            document.getElementById('detratores').textContent = data.detratores;
            document.getElementById('total').textContent = data.total_avaliacoes;
        }

        // Classificação NPS
        const npsValor = data.nps;
        let classificacao = '';
        let cor = '';

        if (npsValor >= 75) {
            classificacao = '🏆 Excelência';
            cor = '#00cc66';
        } else if (npsValor >= 50) {
            classificacao = '✅ Qualidade';
            cor = '#38bdf8';
        } else if (npsValor >= 0) {
            classificacao = '⚠️ Aperfeiçoamento';
            cor = '#f59e0b';
        } else {
            classificacao = '🚨 Crítico';
            cor = '#cc0000';
        }

        document.getElementById('classificacao').textContent = classificacao;
        document.getElementById('classificacao').style.color = cor;

        async function buscarHistorico() {
            const id = document.getElementById('cliente-id').value;
            if (!id) return alert('Digite o ID do cliente!');

            const response = await fetch(`http://localhost:8000/relatorios/clientes/${id}`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await response.json();

            if (data.message) return alert(data.message);

            const div = document.getElementById('historico');
            div.style.display = 'block';
            div.innerHTML = `
                <h3>Cliente: ${data.cliente.nome}</h3>
                <p>E-mail: <span>${data.cliente.email}</span></p>
                <p>Telefone: <span>${data.cliente.telefone || '--'}</span></p>
                <p>CPF: <span>${data.cliente.cpf || '--'}</span></p>
                <br>
                <h3>Pós-vendas (${data.pos_vendas.length})</h3>
                ${data.pos_vendas.map(pv => `<p>Status: <span>${pv.status}</span> | Feedback: <span>${pv.feedback || '--'}</span></p>`).join('')}
                <br>
                <h3>Avaliações NPS (${data.avaliacoes_nps.length})</h3>
                ${data.avaliacoes_nps.map(a => `<p>Nota: <span>${a.score}</span> | Feedback: <span>${a.feedback || '--'}</span></p>`).join('')}
            `;
        }

        function logout() {
            localStorage.removeItem('token');
            window.location.href = 'index.html';
        }

        carregarNPS();
    </script>
</body>

</html>
