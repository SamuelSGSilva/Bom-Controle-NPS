<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoLuiz - NPS</title>
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="toast.js"></script>
    <link rel="stylesheet" href="global.css">
</head>

<body>
    <div class="lado-esquerdo">
        <img src="assets/login.png" alt="AutoLuiz">
        <div class="overlay"></div>
        <div class="marca">
            <div class="linha"></div>
            <h2>AutoLuiz NPS</h2>
            <p>Sistema de Gestão de Pós-venda</p>
        </div>
    </div>

    <div class="lado-direito">
        <div class="login-container">
            <h1>Criar conta</h1>
            <p class="subtitulo">Cadastre-se para acessar o painel</p>
            <form id="registro-form">
                <div class="input-wrapper">
                    <span style="color: #555; font-size: 16px;">
                        <i class="fa-regular fa-user"></i>
                    </span>
                    <input type="text" id="username" placeholder="Usuário" required>
                </div>
                <div class="input-wrapper">
                    <span style="color: #555; font-size: 16px;">
                        <i class="fa-solid fa-lock"></i>
                    </span>
                    <input type="password" id="password" placeholder="Senha" required>
                </div>
                <div class="input-wrapper">
                    <span style="color: #555; font-size: 16px;">
                        <i class="fa-solid fa-lock"></i>
                    </span>
                    <input type="password" id="confirmar-senha" placeholder="Confirmar senha" required>
                </div>
                <button type="submit">Criar conta</button>
            </form>
            <p id="erro-registro"></p>
            <p class="link-login">Já tem uma conta? <a href="index.html">Entrar</a></p>
        </div>
    </div>

    <script>
        document.getElementById('registro-form').addEventListener('submit', async function (e) {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const confirmarSenha = document.getElementById('confirmar-senha').value;
            const erro = document.getElementById('erro-registro');
            erro.textContent = '';

            if (password !== confirmarSenha) {
                erro.textContent = 'As senhas não coincidem';
                return;
            }

            try {
                const response = await fetch('/registrar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await response.json();

                if (response.ok) {
                    toast('Conta criada com sucesso! Faça login.');
                    window.location.href = 'index.html';
                } else {
                    erro.textContent = data.detail || 'Erro ao criar conta';
                }
            } catch (error) {
                erro.textContent = 'Erro ao conectar com o servidor';
            }
        });
    </script>
</body>

</html>
