<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avaliações</title>
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <link rel="stylesheet" href="global.css">
</head>
<body>
    <header>
        <img src="assets/logo.png" style="height: 40px;">
        <nav>
            <a href="dashboard.html">Dashboard</a>
            <a href="clientes.html">Clientes</a>
            <a href="novo-cliente.html">Novo Cliente</a>
            <a href="posvendas.html">Pós-venda</a>
            <a href="relatorios.html">Relatórios</a>
            <a href="historico.html">Histórico</a>
            <a href="avaliacao.html" class="ativo">Avaliação</a>
            <a href="importar.html">Importar</a>
            <a href="auditoria.html">Auditoria</a>
        </nav>
        <button onclick="logout()">Sair</button>
    </header>

    <main>
    <div id="formulario">
        <h2>Como você nos avalia?</h2>
        <p class="subtitulo">De 0 a 10, qual a probabilidade de você nos recomendar a um amigo?</p>

        <div class="notas" id="notas"></div>

        <div class="legenda">
            <span>Muito improvável</span>
            <span>Muito provável</span>
        </div>

        <textarea id="feedback" placeholder="Deixe um comentário (opcional)"></textarea>

        <button type="submit" onclick="enviar()">Enviar avaliação</button>
    </div>

    <div id="agradecimento">
        <h2>Obrigado! 🎉</h2>
        <p>Sua avaliação foi registrada com sucesso.</p>
    </div>
</main>

<script>
    const params = new URLSearchParams(window.location.search);
    const clienteId = parseInt(params.get('cliente_id'));
    let notaSelecionada = null;

    // Gera os botões de 0 a 10
    const container = document.getElementById('notas');
    for (let i = 0; i <= 10; i++) {
        const btn = document.createElement('button');
        btn.textContent = i;
        btn.className = 'nota';
        btn.onclick = () => {
            document.querySelectorAll('.nota').forEach(b => b.classList.remove('selecionada'));
            btn.classList.add('selecionada');
            notaSelecionada = i;
        };
        container.appendChild(btn);
    }

    async function enviar() {
        if (notaSelecionada === null) {
            alert('Selecione uma nota antes de enviar!');
            return;
        }

        const response = await fetch('/nps/publico', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                cliente_id: clienteId,
                score: notaSelecionada,
                feedback: document.getElementById('feedback').value || null
            })
        });

        if (response.ok) {
            document.getElementById('formulario').style.display = 'none';
            document.getElementById('agradecimento').style.display = 'block';
        } else {
            alert('Erro ao enviar avaliação!');
        }
    }
</script>
</body>
</html>
