<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoLuiz - NPS</title>
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="toast.js"></script>
    <link rel="stylesheet" href="global.css">
</head>

<body>
    <div class="lado-esquerdo">
        <img src="assets/login.png" alt="AutoLuiz">
        <div class="overlay"></div>
        <div class="marca">
            <div class="linha"></div>
            <h2>AutoLuiz NPS</h2>
            <p>Sistema de Gestão de Pós-venda</p>
        </div>
    </div>

    <div class="lado-direito">
        <div class="login-container">
            <h1>Bem-vindo!</h1>
            <p class="subtitulo">Faça login para acessar o painel</p>
            <form id="login-form">
                <div class="input-wrapper">
                    <span style="color: #555; font-size: 16px;">
                        <i class="fa-regular fa-user"></i>
                    </span>
                    <input type="text" id="username" placeholder="Usuário" required>
                </div>
                <div class="input-wrapper">
                    <span style="color: #555; font-size: 16px;">
                        <i class="fa-solid fa-lock"></i>
                    </span>
                    <input type="password" id="password" placeholder="Senha" required>
                    <span onclick="toggleSenha()" id="icone-olho"
                        style="cursor: pointer; color: #555; font-size: 16px; user-select: none;">
                        <i class="fa-regular fa-eye"></i>
                    </span>
                </div>
                <button type="submit">Entrar</button>
            </form>
            <p id="erro-login"></p>
            <p class="link-registro">Ainda não tem uma conta? <a href="registro.html">Criar conta</a></p>
        </div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async function (e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            try {
                const response = await fetch('/token', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await response.json();
                if (response.ok) {
                    localStorage.setItem('token', data.access_token);
                    localStorage.setItem('username', username);
                    window.location.href = 'dashboard.html';
                } else {
                    document.getElementById('erro-login').textContent = 'Usuário ou senha inválidos';
                }
            } catch (error) {
                document.getElementById('erro-login').textContent = 'Erro ao conectar com o servidor';
            }
        });

        function toggleSenha() {
            const input = document.getElementById('password');
            const olho = document.getElementById('icone-olho');
            if (input.type === 'password') {
                input.type = 'text';
                olho.innerHTML = '<i class="fa-regular fa-eye-slash"></i>';
            } else {
                input.type = 'password';
                olho.innerHTML = '<i class="fa-regular fa-eye"></i>';
            }
        }
    </script>
</body>

</html>
