<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bom Controle NPS</title>
    <style> 
        *{
    margin:0;
    padding:0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body{
    background: #0f172a;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.login-container{
    background: #1e293b;
    padding: 40px;
    border-radius: 12px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    width: 360px;
}

h1{
    color: #38bdf8;
    font-size: 22px;
    margin-bottom: 8px;
}

p.subtitulo{
    color: #94a3b8;
    font-size: 13px;
    margin-bottom: 28px;
}

input{
    width: 100%;
    padding: 12px 16px;
    margin-bottom: 16px;
    background: #0f172a;
    border: 1px solid #334155;
    border-radius: 8px;
    color: #f1f5f9;
    font-size: 14px;
    outline: none;
    transition: border 0.2s;
}

input:focus{
    border-color:#38bdf8
}

button{
    width: 100%;
    padding: 12px;
    background: #38bdf8;
    color: #0f172a;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
}

button:hover{
    color: #f87171;
    font-size: 13px;
    margin-top: 12px;
    text-align: center;
}
    </style>
</head>
<script>
    document.getElementById('login-form').addEventListener('submit', async function(e) {
        e.preventDefault();

        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;

        try {
            const response = await fetch('http://localhost:8000/token', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            const data = await response.json();

            if (response.ok) {
                localStorage.setItem('token', data.access_token);
                window.location.href = 'dashboard.html';
            } else {
                document.getElementById('erro-login').textContent = 'Usuário ou senha inválidos';
            }
        } catch (error) {
            document.getElementById('erro-login').textContent = 'Erro ao conectar com o servidor';
        }
    });
</script>
<body>

    <div class="login-container">
        <h1>Bom Controle NPS</h1>
        <p class="subtitulo">Faça login para acessar o painel</p>
        <form id="login-form">
           <input type="text" id="username" placeholder="Usuário" required>
           <input type="password" id="password" placeholder="Senha" required>
           <button type="submit">Entrar</button>
        </form>
        <p id="erro-login"></p>
    </div>
</body>
</html>
