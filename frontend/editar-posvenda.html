<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Pós-Venda</title>
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <script src="toast.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: #0a0a0a;
            color: #f1f1f1;
            min-height: 100vh;
        }

        header {
            background: #141414;
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #cc0000;
        }

        header button {
            background: transparent;
            border: 1px solid #cc0000;
            color: #cc0000;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }

        header button:hover {
            background: #cc0000;
            color: #fff;
        }

        nav {
            display: flex;
            gap: 24px;
        }

        nav a {
            color: #888888;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s;
        }

        nav a:hover {
            color: #cc0000;
        }

        nav a.ativo {
            color: #cc0000;
            font-weight: 600;
        }

        main {
            padding: 32px;
            max-width: 550px;
            margin: 40px auto;
            background: #141414;
            border-radius: 12px;
            border-top: 3px solid #cc0000;
        }

        h2 {
            margin-bottom: 24px;
            font-size: 18px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 13px;
            color: #888888;
            margin-bottom: 6px;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            background: #141414;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            color: #f1f1f1;
            font-size: 14px;
            outline: none;
            transition: border 0.2s;
        }

        input:focus {
            border-color: #cc0000;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        button[type="submit"] {
            width: 100%;
            padding: 12px;
            background: #cc0000;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            transition: background 0.2s;
        }

        button[type="submit"]:hover {
            background: #aa0000;
        }

        select {
            width: 100%;
            padding: 12px 16px;
            background: #141414;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            color: #f1f1f1;
            font-size: 14px;
            outline: none;
            cursor: pointer;
        }

        select:focus {
            border-color: #cc0000;
        }
    </style>
    <link rel="stylesheet" href="responsive.css">
</head>

<body>
    <header>
        <img src="assets/logo.png" style="height: 40px;">
        <nav>
            <a href="dashboard.html">Dashboard</a>
            <a href="clientes.html">Clientes</a>
            <a href="novo-cliente.html">Novo Cliente</a>
            <a href="editar-cliente.html">Editar Cliente</a>
            <a href="posvendas.html">Pós-venda</a>
            <a href="editar-posvenda.html" class="ativo">Editar Pós-Venda</a>
            <a href="relatorios.html">Relatórios</a>
            <a href="avaliacao-completa.html">Avaliações</a>
             <a href="importar.html">Importar</a>
            <a href="auditoria.html">Auditoria</a>
        </nav>
        <button onclick="logout()">Sair</button>
    </header>

    <main>
        <h2>Editar Pós-Venda</h2>
        <form id="form-posvenda">
            <div class="form-group">
                <label>Cliente ID</label>
                <input type="number" id="cliente_id" required>
            </div>
            <div class="form-group">
                <label>Feedback</label>
                <input type="text" id="feedback">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Status</label>
                    <select id="status">
                        <option value="pendente">Pendente</option>
                        <option value="em andamento">Em Andamento</option>
                        <option value="concluido">Concluído</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Data de Retorno</label>
                    <input type="date" id="data_retorno">
                </div>
            </div>
            <button type="submit">Salvar Alterações</button>
        </form>
    </main>

    <script>
    const token = localStorage.getItem('token');
    if (!token) window.location.href = 'index.html';

    const params = new URLSearchParams(window.location.search);
    const pvId = params.get('id');

    async function carregarPosVenda() {
        const response = await fetch(`/pos-venda/buscar/${pvId}`, {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        const pv = await response.json();

        document.getElementById('cliente_id').value = pv.cliente_id || '';
        document.getElementById('feedback').value = pv.feedback || '';
        document.getElementById('status').value = pv.status || 'pendente';
        document.getElementById('data_retorno').value = pv.data_retorno ? pv.data_retorno.split('T')[0] : '';
    }

    document.getElementById('form-posvenda').addEventListener('submit', async function(e) {
        e.preventDefault();

        const posVenda = {
            cliente_id: parseInt(document.getElementById('cliente_id').value),
            feedback: document.getElementById('feedback').value || null,
            status: document.getElementById('status').value,
            data_retorno: document.getElementById('data_retorno').value || null
        };

        const response = await fetch(`/pos-venda/${pvId}`, {
            method: 'PUT',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify(posVenda)
        });

        if (response.ok) {
            toast('Pós-venda atualizado com sucesso!');
            window.location.href = 'posvendas.html';
        } else {
            toast('Erro ao atualizar pós-venda!', 'erro');
        }
    });

    function logout() {
        localStorage.removeItem('token');
        window.location.href = 'index.html';
    }
    carregarPosVenda();
</script>
</body>
</html>
