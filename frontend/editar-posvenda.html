<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Pós-Venda</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="responsive.css">
    <script src="toast.js"></script>
    <script src="navbar.js" defer></script>
</head>

<body>

    <main class="form-card">
        <h2>Editar Pós-Venda</h2>

        <form id="form-posvenda">
            <div class="form-group">
                <label>Cliente ID</label>
                <input type="number" id="cliente_id" required>
            </div>
            <div class="form-group">
                <label>Feedback</label>
                <input type="text" id="feedback">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Status</label>
                    <select id="status">
                        <option value="pendente">Pendente</option>
                        <option value="em andamento">Em Andamento</option>
                        <option value="concluido">Concluído</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Data de Retorno</label>
                    <input type="date" id="data_retorno">
                </div>
            </div>
            <div class="form-group">
                <label>Observações internas</label>
                <textarea id="observacoes" placeholder="Observações internas sobre este pós-venda..."></textarea>
            </div>
            <button type="submit">Salvar Alterações</button>
        </form>
    </main>

    <script>
    const token = localStorage.getItem('token');
    if (!token) window.location.href = 'index.html';

    const params = new URLSearchParams(window.location.search);
    const pvId = params.get('id');

    async function carregarPosVenda() {
        const response = await fetch(`/pos-venda/buscar/${pvId}`, {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        const pv = await response.json();

        document.getElementById('cliente_id').value = pv.cliente_id || '';
        document.getElementById('feedback').value = pv.feedback || '';
        document.getElementById('status').value = pv.status || 'pendente';
        document.getElementById('data_retorno').value = pv.data_retorno ? pv.data_retorno.split('T')[0] : '';
        document.getElementById('observacoes').value = pv.observacoes || '';
    }

    document.getElementById('form-posvenda').addEventListener('submit', async function(e) {
        e.preventDefault();

        const posVenda = {
            cliente_id: parseInt(document.getElementById('cliente_id').value),
            feedback: document.getElementById('feedback').value || null,
            status: document.getElementById('status').value,
            data_retorno: document.getElementById('data_retorno').value || null,
            observacoes: document.getElementById('observacoes').value || null
        };

        const response = await fetch(`/pos-venda/${pvId}`, {
            method: 'PUT',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify(posVenda)
        });

        if (response.ok) {
            toast('Pós-venda atualizado com sucesso!');
            window.location.href = 'posvendas.html';
        } else {
            toast('Erro ao atualizar pós-venda!', 'erro');
        }
    });

    function logout() {
        localStorage.removeItem('token');
        window.location.href = 'index.html';
    }
    carregarPosVenda();
</script>
</body>
</html>
