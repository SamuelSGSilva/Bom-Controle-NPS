<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Cliente</title>
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <script src="toast.js"></script>
    <link rel="stylesheet" href="global.css">
</head>

<body>
    <header>
        <img src="assets/logo.png" style="height: 40px;">
        <nav>
            <a href="dashboard.html">Dashboard</a>
            <a href="clientes.html">Clientes</a>
            <a href="novo-cliente.html">Novo Cliente</a>
            <a href="editar-cliente.html" class="ativo">Editar Cliente</a>
            <a href="posvendas.html">Pós-venda</a>
            <a href="relatorios.html">Relatórios</a>
            <a href="avaliacao-completa.html">Avaliações</a>
            <a href="importar.html">Importar</a>
            <a href="auditoria.html">Auditoria</a>
        </nav>
        <button onclick="logout()">Sair</button>
    </header>

    <main>
        <h2>Novo Cliente</h2>
        <form id="form-cliente">
            <div class="form-group">
                <label>Nome completo</label>
                <input type="text" id="nome" required>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>E-mail</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label>Telefone</label>
                    <input type="text" id="telefone">
                </div>
            </div>
            <div class="form-group">
                <label>Tipo de documento</label>
                <div class="tipo-doc-toggle">
                    <button type="button" class="tipo-doc-btn ativo" data-tipo="cpf">CPF</button>
                    <button type="button" class="tipo-doc-btn" data-tipo="cnpj">CNPJ</button>
                </div>
            </div>
            <div class="form-group" id="grupo-cpf">
                <label>CPF</label>
                <input type="text" id="cpf">
            </div>
            <div class="form-group" id="grupo-cnpj" style="display: none;">
                <label>CNPJ</label>
                <input type="text" id="cnpj">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>CEP</label>
                    <input type="text" id="cep">
                </div>
                <div class="form-group">
                    <label>Número</label>
                    <input type="text" id="numero">
                </div>
            </div>
            <div class="form-group">
                <label>Logradouro</label>
                <input type="text" id="logradouro">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Bairro</label>
                    <input type="text" id="bairro">
                </div>
                <div class="form-group">
                    <label>Cidade</label>
                    <input type="text" id="cidade">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Estado</label>
                    <input type="text" id="estado">
                </div>
                <div class="form-group">
                    <label>Data de Nascimento</label>
                    <input type="date" id="data_nascimento">
                </div>
            </div>
            <button type="submit">Salvar Alterações</button>
        </form>
    </main>

    <script>
        const token = localStorage.getItem('token');
        if (!token) window.location.href = 'index.html';

        const params = new URLSearchParams(window.location.search);
        const clienteId = params.get('id');

        // Carrega os dados do cliente
        async function carregarCliente() {
            const response = await fetch(`/clientes/${clienteId}`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const cliente = await response.json();

            document.getElementById('nome').value = cliente.nome || '';
            document.getElementById('email').value = cliente.email || '';
            document.getElementById('telefone').value = cliente.telefone || '';
            document.getElementById('cpf').value = cliente.cpf || '';
            document.getElementById('cnpj').value = cliente.cnpj || '';
            document.getElementById('cep').value = cliente.cep || '';
            document.getElementById('logradouro').value = cliente.logradouro || '';
            document.getElementById('numero').value = cliente.numero || '';
            document.getElementById('bairro').value = cliente.bairro || '';
            document.getElementById('cidade').value = cliente.cidade || '';
            document.getElementById('estado').value = cliente.estado || '';
            document.getElementById('data_nascimento').value = cliente.data_nascimento ? cliente.data_nascimento.split('T')[0] : '';

            const tipoInicial = cliente.cnpj ? 'cnpj' : 'cpf';
            document.querySelector(`.tipo-doc-btn[data-tipo="${tipoInicial}"]`).click();
        }

        // Alterna entre CPF e CNPJ
        document.querySelectorAll('.tipo-doc-btn').forEach(function (btn) {
            btn.addEventListener('click', function () {
                document.querySelectorAll('.tipo-doc-btn').forEach(b => b.classList.remove('ativo'));
                btn.classList.add('ativo');
                document.getElementById('grupo-cpf').style.display = btn.dataset.tipo === 'cpf' ? 'block' : 'none';
                document.getElementById('grupo-cnpj').style.display = btn.dataset.tipo === 'cnpj' ? 'block' : 'none';
            });
        });

        // Salva as alterações
        document.getElementById('form-cliente').addEventListener('submit', async function (e) {
            e.preventDefault();

            const cpf = document.getElementById('cpf').value;
            const cnpj = document.getElementById('cnpj').value;

            if (cpf && !validarCPF(cpf)) {
               toast('CPF inválido!', 'aviso');
                return;
            }

            if (cnpj && !validarCNPJ(cnpj)) {
                 toast('CNPJ inválido!', 'aviso');
                return;
            }

            const cliente = {
                nome: document.getElementById('nome').value,
                email: document.getElementById('email').value,
                telefone: document.getElementById('telefone').value || null,
                cpf: document.getElementById('cpf').value || null,
                cnpj: document.getElementById('cnpj').value || null,
                cep: document.getElementById('cep').value || null,
                logradouro: document.getElementById('logradouro').value || null,
                numero: document.getElementById('numero').value || null,
                bairro: document.getElementById('bairro').value || null,
                cidade: document.getElementById('cidade').value || null,
                estado: document.getElementById('estado').value || null,
                data_nascimento: document.getElementById('data_nascimento').value || null
            };

            const response = await fetch(`/clientes/${clienteId}`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify(cliente)
            });

            if (response.ok) {
                toast('Cliente atualizado com sucesso!');
                window.location.href = 'clientes.html';
            } else {
                toast('Erro ao atualizar cliente!', 'erro');
            }
        });

        function validarCPF(cpf) {
            cpf = cpf.replace(/\D/g, '');
            if (cpf.length !== 11 || /^(\d)\1+$/.test(cpf)) return false;

            let soma = 0;
            for (let i = 0; i < 9; i++) soma += parseInt(cpf[i]) * (10 - i);
            let resto = (soma * 10) % 11;
            if (resto === 10 || resto === 11) resto = 0;
            if (resto !== parseInt(cpf[9])) return false;

            soma = 0;
            for (let i = 0; i < 10; i++) soma += parseInt(cpf[i]) * (11 - i);
            resto = (soma * 10) % 11;
            if (resto === 10 || resto === 11) resto = 0;
            return resto === parseInt(cpf[10]);
        }

        function validarCNPJ(cnpj) {
            cnpj = cnpj.replace(/\D/g, '');
            if (cnpj.length !== 14 || /^(\d)\1+$/.test(cnpj)) return false;

            let tamanho = cnpj.length - 2;
            let numeros = cnpj.substring(0, tamanho);
            const digitos = cnpj.substring(tamanho);
            let soma = 0, pos = tamanho - 7;

            for (let i = tamanho; i >= 1; i--) {
                soma += parseInt(numeros.charAt(tamanho - i)) * pos--;
                if (pos < 2) pos = 9;
            }
            let resultado = soma % 11 < 2 ? 0 : 11 - (soma % 11);
            if (resultado !== parseInt(digitos.charAt(0))) return false;

            tamanho++;
            numeros = cnpj.substring(0, tamanho);
            soma = 0; pos = tamanho - 7;
            for (let i = tamanho; i >= 1; i--) {
                soma += parseInt(numeros.charAt(tamanho - i)) * pos--;
                if (pos < 2) pos = 9;
            }
            resultado = soma % 11 < 2 ? 0 : 11 - (soma % 11);
            return resultado === parseInt(digitos.charAt(1));
        }

        function logout() {
            localStorage.removeItem('token');
            window.location.href = 'index.html';
        }

        carregarCliente();

        document.getElementById('cep').addEventListener('blur', async function () {
            const cep = this.value.replace(/\D/g, '');
            if (cep.length !== 8) return;

            const response = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
            const data = await response.json();

            if (!data.erro) {
                document.getElementById('logradouro').value = data.logradouro;
                document.getElementById('bairro').value = data.bairro;
                document.getElementById('cidade').value = data.localidade;
                document.getElementById('estado').value = data.uf;
            }
        });
    </script>
</body>

</html>
