<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Cliente</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: #0a0a0a;
            color: #f1f1f1;
            min-height: 100vh;
        }

        header {
            background: #141414;
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #cc0000;
        }

        header button {
            background: transparent;
            border: 1px solid #cc0000;
            color: #cc0000;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }

        header button:hover {
            background: #cc0000;
            color: #fff;
        }

        nav {
            display: flex;
            gap: 24px;
        }

        nav a {
            color: #888888;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s;
        }

        nav a:hover {
            color: #cc0000;
        }

        nav a.ativo {
            color: #cc0000;
            font-weight: 600;
        }

        main {
            padding: 32px;
            max-width: 550px;
            margin: 40px auto;
            background: #141414;
            border-radius: 12px;
            border-top: 3px solid #cc0000;
        }

        h2 {
            margin-bottom: 24px;
            font-size: 18px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 13px;
            color: #888888;
            margin-bottom: 6px;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            background: #141414;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            color: #f1f1f1;
            font-size: 14px;
            outline: none;
            transition: border 0.2s;
        }

        input:focus {
            border-color: #cc0000;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        button[type="submit"] {
            width: 100%;
            padding: 12px;
            background: #cc0000;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            transition: background 0.2s;
        }

        button[type="submit"]:hover {
            background: #aa0000;
        }
    </style>
</head>
<body>
    <header>
        <img src="assets/logo.png" style="height: 40px;">
        <nav>
            <a href="dashboard.html">Dashboard</a>
            <a href="clientes.html">Clientes</a>
            <a href="novo-cliente.html">Novo Cliente</a>
            <a href="editar-cliente.html" class="ativo">Editar Cliente</a>
            <a href="posvendas.html">Pós-venda</a>
            <a href="relatorios.html">Relatórios</a>
        </nav>
        <button onclick="logout()">Sair</button>
    </header>

     <main>
        <h2>Novo Cliente</h2>
        <form id="form-cliente">
            <div class="form-group">
                <label>Nome completo</label>
                <input type="text" id="nome" required>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>E-mail</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label>Telefone</label>
                    <input type="text" id="telefone">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>CPF</label>
                    <input type="text" id="cpf">
                </div>
                <div class="form-group">
                    <label>CNPJ</label>
                    <input type="text" id="cnpj">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>CEP</label>
                    <input type="text" id="cep">
                </div>
                <div class="form-group">
                    <label>Número</label>
                    <input type="text" id="numero">
                </div>
            </div>
            <div class="form-group">
                <label>Logradouro</label>
                <input type="text" id="logradouro">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Bairro</label>
                    <input type="text" id="bairro">
                </div>
                <div class="form-group">
                    <label>Cidade</label>
                    <input type="text" id="cidade">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Estado</label>
                    <input type="text" id="estado">
                </div>
                <div class="form-group">
                    <label>Data de Nascimento</label>
                    <input type="date" id="data_nascimento">
                </div>
            </div>
            <button type="submit">Salvar Alterações</button>
        </form>
    </main>

    <script>
    const token = localStorage.getItem('token');
    if (!token) window.location.href = 'index.html';

    const params = new URLSearchParams(window.location.search);
    const clienteId = params.get('id');

    // Carrega os dados do cliente
    async function carregarCliente() {
        const response = await fetch(`http://localhost:8000/clientes/${clienteId}`, {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        const cliente = await response.json();

        document.getElementById('nome').value = cliente.nome || '';
        document.getElementById('email').value = cliente.email || '';
        document.getElementById('telefone').value = cliente.telefone || '';
        document.getElementById('cpf').value = cliente.cpf || '';
        document.getElementById('cnpj').value = cliente.cnpj || '';
        document.getElementById('cep').value = cliente.cep || '';
        document.getElementById('logradouro').value = cliente.logradouro || '';
        document.getElementById('numero').value = cliente.numero || '';
        document.getElementById('bairro').value = cliente.bairro || '';
        document.getElementById('cidade').value = cliente.cidade || '';
        document.getElementById('estado').value = cliente.estado || '';
        document.getElementById('data_nascimento').value = cliente.data_nascimento ? cliente.data_nascimento.split('T')[0] : '';
    }

    // Salva as alterações
    document.getElementById('form-cliente').addEventListener('submit', async function(e) {
        e.preventDefault();

        const cliente = {
            nome: document.getElementById('nome').value,
            email: document.getElementById('email').value,
            telefone: document.getElementById('telefone').value || null,
            cpf: document.getElementById('cpf').value || null,
            cnpj: document.getElementById('cnpj').value || null,
            cep: document.getElementById('cep').value || null,
            logradouro: document.getElementById('logradouro').value || null,
            numero: document.getElementById('numero').value || null,
            bairro: document.getElementById('bairro').value || null,
            cidade: document.getElementById('cidade').value || null,
            estado: document.getElementById('estado').value || null,
            data_nascimento: document.getElementById('data_nascimento').value || null
        };

        const response = await fetch(`http://localhost:8000/clientes/${clienteId}`, {
            method: 'PUT',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify(cliente)
        });

        if (response.ok) {
            alert('Cliente atualizado com sucesso!');
            window.location.href = 'clientes.html';
        } else {
            alert('Erro ao atualizar cliente!');
        }
    });

    function logout() {
        localStorage.removeItem('token');
        window.location.href = 'index.html';
    }

    carregarCliente();

    document.getElementById('cep').addEventListener('blur', async function() {
    const cep = this.value.replace(/\D/g, '');
    if (cep.length !== 8) return;

    const response = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
    const data = await response.json();

    if (!data.erro) {
        document.getElementById('logradouro').value = data.logradouro;
        document.getElementById('bairro').value = data.bairro;
        document.getElementById('cidade').value = data.localidade;
        document.getElementById('estado').value = data.uf;
    }
});
</script>
</body>
</html>
