<!DOCTYPE html>
<html lang="pt_BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clientes</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="responsive.css">
    <script src="toast.js"></script>
    <script src="navbar.js" defer></script>
</head>

<body>


    <main>
        <div style="display: flex; flex-wrap: wrap; row-gap: 12px; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2>Clientes</h2>
            <div style="display: flex; flex-wrap: wrap; row-gap: 12px; gap: 12px;">
                <input type="text" id="busca" placeholder="Buscar por nome..." onkeyup="filtrarClientes()"
                    style="padding: 10px 16px; background: #141414; border: 1px solid #2a2a2a; border-radius: 8px; color: #f1f1f1; font-size: 14px; outline: none; width: 250px;">
                <button class="btn-novo" onclick="novoCliente()">+ Novo Cliente</button>
            </div>
        </div>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>E-mail</th>
                        <th>Telefone</th>
                        <th>CPF/CNPJ</th>
                        <th>Cidade/Estado</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="tabela-clientes">
                </tbody>
            </table>
        </div>
    </main>

    <script>
        const token = localStorage.getItem('token');
        if (!token) window.location.href = 'index.html';

        let todosClientes = [];

        async function carregarClientes() {
            const response = await fetch('/clientes', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            todosClientes = await response.json();
            renderizarClientes(todosClientes);
        }

        let paginaAtual = 1;
        const itensPorPagina = 10;

        function renderizarClientes(clientes) {
            const tabela = document.getElementById('tabela-clientes');
            const total = clientes.length;
            const totalPaginas = Math.ceil(total / itensPorPagina);
            const inicio = (paginaAtual - 1) * itensPorPagina;
            const fim = inicio + itensPorPagina;
            const clientesPagina = clientes.slice(inicio, fim);

            tabela.innerHTML = '';

            if (clientes.length === 0) {
                tabela.innerHTML = '<tr><td colspan="6" style="text-align:center">Nenhum cliente encontrado</td></tr>';
                renderizarPaginacao([], 0);
                return;
            }

            clientesPagina.forEach(cliente => {
                const row = document.createElement('tr');
                row.innerHTML = `
            <td data-label="Nome">${cliente.nome}</td>
            <td data-label="E-mail">${cliente.email}</td>
            <td data-label="Telefone">${cliente.telefone || '--'}</td>
            <td data-label="CPF/CNPJ">${cliente.cpf || cliente.cnpj || '--'}</td>
            <td data-label="Cidade/Estado">${cliente.cidade || '--'}/${cliente.estado || '--'}</td>
            <td data-label="Ações">
                <button class="btn-ver" onclick="verHistorico(${cliente.id})">Ver</button>
                <button class="btn-editar" onclick="editarCliente(${cliente.id})">Editar</button>
                <button class="btn-deletar" onclick="deletarCliente(${cliente.id})">Excluir</button>
            </td>
        `;
                tabela.appendChild(row);
            });

            renderizarPaginacao(clientes, totalPaginas);
        }

        function renderizarPaginacao(clientes, totalPaginas) {
            let paginacao = document.getElementById('paginacao');
            if (!paginacao) {
                paginacao = document.createElement('div');
                paginacao.id = 'paginacao';
                document.querySelector('main').appendChild(paginacao);
            }

            paginacao.innerHTML = '';
            if (totalPaginas <= 1) return;

            paginacao.style.cssText = 'display:flex; flex-wrap:wrap; gap:8px; margin-top:20px; justify-content:center;';

            for (let i = 1; i <= totalPaginas; i++) {
                const btn = document.createElement('button');
                btn.textContent = i;
                btn.style.cssText = `
            padding: 8px 14px;
            border-radius: 6px;
            border: 1px solid ${i === paginaAtual ? '#cc0000' : '#2a2a2a'};
            background: ${i === paginaAtual ? '#cc0000' : 'transparent'};
            color: #f1f1f1;
            cursor: pointer;
            font-size: 13px;
        `;
                btn.onclick = () => {
                    paginaAtual = i;
                    renderizarClientes(todosClientes);
                };
                paginacao.appendChild(btn);
            }
        }

        function filtrarClientes() {
            paginaAtual = 1;
            const busca = document.getElementById('busca').value.toLowerCase();
            const filtrados = todosClientes.filter(c => c.nome.toLowerCase().includes(busca));
            renderizarClientes(filtrados);
        }

        function editarCliente(id) {
            window.location.href = `editar-cliente.html?id=${id}`;
        }

        async function deletarCliente(id) {
            if (!confirm('Tem certeza que deseja excluir este cliente?')) return;

            const response = await fetch(`/clientes/${id}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${token}` }
            });

            if (response.ok) {
                toast('Cliente excluído com sucesso!');
                carregarClientes();
            } else {
                toast('Erro ao excluir cliente!', 'erro');
            }
        }

        function verHistorico(id) {
            window.location.href = `historico.html?id=${id}`;
        }

        function novoCliente() {
            window.location.href = 'novo-cliente.html';
        }

        function logout() {
            localStorage.removeItem('token');
            window.location.href = 'index.html';
        }

        carregarClientes();
    </script>
</body>

</html>
