<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pós-Vendas</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="responsive.css">
    <script src="toast.js"></script>
    <script src="navbar.js" defer></script>
</head>

<body>


    <main>
        <div style="display: flex; flex-wrap: wrap; row-gap: 12px; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <div style="display: flex; flex-wrap: wrap; row-gap: 12px; gap: 12px;">
                <div class="autocomplete-wrapper">
                    <input type="text" id="busca-cliente" placeholder="Buscar por cliente..." autocomplete="off"
                        style="padding: 10px 16px; background: #141414; border: 1px solid #2a2a2a; border-radius: 8px; color: #f1f1f1; font-size: 14px; outline: none;">
                    <div class="autocomplete-lista" id="lista-sugestoes-busca"></div>
                </div>
                <select id="filtro-status" onchange="aplicarFiltros()"
                    style="padding: 10px 16px; background: #141414; border: 1px solid #2a2a2a; border-radius: 8px; color: #f1f1f1; font-size: 14px; outline: none; cursor: pointer;">
                    <option value="">Todos</option>
                    <option value="pendente">Pendente</option>
                    <option value="em andamento">Em Andamento</option>
                    <option value="concluido">Concluído</option>
                </select>
                <input type="date" id="filtro-periodo-de" title="Cadastrado a partir de" onchange="aplicarFiltros()">
                <input type="date" id="filtro-periodo-ate" title="Cadastrado até" onchange="aplicarFiltros()">
                <button class="btn-novo" onclick="novoPosVendas()">+ Novo Pós-Vendas</button>
                <a class="btn-editar" href="auditoria.html?entidade=pos_venda" style="text-decoration: none; display: inline-flex; align-items: center;">Ver Excluídos</a>
            </div>
            <div id="loading" style="text-align: center; padding: 40px; display: none;">
                <div class="spinner"></div>
                <p style="color: #888888; margin-top: 12px;">Carregando...</p>
            </div>
        </div>
        <div class="table-container" id="container-posvendas">
            <table>
                <thead>
                    <tr>
                        <th>Cliente</th>
                        <th>Status</th>
                        <th>Data de Retorno</th>
                        <th>Feedback</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="tabela-posvendas"></tbody>
            </table>
        </div>
    </main>

    <div class="modal-fundo" id="modal-detalhes">
        <div class="modal-caixa">
            <button class="modal-fechar" onclick="fecharModalDetalhes()">&times;</button>
            <h3 id="modal-titulo">Detalhes</h3>
            <p class="subtitulo" id="modal-subtitulo"></p>

            <div class="modal-secao">
                <h4>Comentários do cliente</h4>
                <div id="modal-comentarios"></div>
            </div>

            <div class="modal-secao">
                <h4>Observações internas</h4>
                <textarea id="modal-observacoes" placeholder="Anote aqui observações internas sobre este pós-venda..."></textarea>
                <br>
                <button class="btn-salvar" onclick="salvarObservacoes()">Salvar observações</button>
            </div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        if (!token) window.location.href = 'index.html';

        // O backend grava created_at em UTC sem indicar o fuso na string ISO;
        // sem o "Z" o navegador interpreta como horário local, adiantando o valor.
        function dataLocal(isoSemFuso) {
            return new Date(isoSemFuso.endsWith('Z') ? isoSemFuso : isoSemFuso + 'Z');
        }

        let todosPosVendas = [];
        let todosClientesPV = [];

        async function carregarPosVendas() {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('tabela-posvendas').innerHTML = '';

            const [resPV, resCli] = await Promise.all([
                fetch('/pos-venda', { headers: { 'Authorization': `Bearer ${token}` } }),
                fetch('/clientes', { headers: { 'Authorization': `Bearer ${token}` } })
            ]);

            document.getElementById('loading').style.display = 'none';

            if (resPV.status === 401 || resCli.status === 401) {
                localStorage.removeItem('token');
                window.location.href = 'index.html';
                return;
            }

            if (!resPV.ok || !resCli.ok) {
                toast('Erro ao carregar pós-vendas!', 'erro');
                return;
            }

            todosPosVendas = await resPV.json();
            todosClientesPV = await resCli.json();
            renderizarPosVendas(todosPosVendas);
        }

        async function deletarPosVenda(id) {
            if (!confirm('Tem certeza que deseja excluir este pós-venda?')) return;

            const response = await fetch(`/pos-venda/${id}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${token}` }
            });

            if (response.ok) {
                toast('Pós-venda excluído com sucesso!');
                carregarPosVendas();
            } else {
                toast('Erro ao excluir pós-venda!', 'erro');
            }
        }

        const inputBusca = document.getElementById('busca-cliente');
        const listaSugestoesBusca = document.getElementById('lista-sugestoes-busca');
        let sugestoesBusca = [];

        function esconderSugestoesBusca() {
            listaSugestoesBusca.style.display = 'none';
            listaSugestoesBusca.innerHTML = '';
            sugestoesBusca = [];
        }

        function renderizarSugestoesBusca(texto) {
            const nomesUnicos = new Set();
            sugestoesBusca = todosClientesPV.filter(c => {
                const nome = c.nome.toLowerCase();
                if (!nome.includes(texto.toLowerCase()) || nomesUnicos.has(nome)) return false;
                nomesUnicos.add(nome);
                return true;
            }).slice(0, 8);

            if (sugestoesBusca.length === 0) {
                esconderSugestoesBusca();
                return;
            }

            listaSugestoesBusca.innerHTML = sugestoesBusca.map((c, i) => `
                <div class="autocomplete-item" data-indice="${i}">${c.nome}</div>
            `).join('');
            listaSugestoesBusca.style.display = 'block';

            listaSugestoesBusca.querySelectorAll('.autocomplete-item').forEach(item => {
                item.addEventListener('mousedown', function (e) {
                    e.preventDefault();
                    const cliente = sugestoesBusca[Number(item.dataset.indice)];
                    inputBusca.value = cliente.nome;
                    esconderSugestoesBusca();
                    aplicarFiltros();
                });
            });
        }

        inputBusca.addEventListener('input', function () {
            const texto = inputBusca.value.trim();
            aplicarFiltros();
            if (texto) {
                renderizarSugestoesBusca(texto);
            } else {
                esconderSugestoesBusca();
            }
        });

        inputBusca.addEventListener('blur', esconderSugestoesBusca);

        function aplicarFiltros() {
            const status = document.getElementById('filtro-status').value;
            const busca = document.getElementById('busca-cliente').value.trim().toLowerCase();
            const periodoDe = document.getElementById('filtro-periodo-de').value;
            const periodoAte = document.getElementById('filtro-periodo-ate').value;

            let filtrados = todosPosVendas;

            if (status) {
                filtrados = filtrados.filter(pv => pv.status === status);
            }

            if (busca) {
                filtrados = filtrados.filter(pv => (pv.cliente_nome || '').toLowerCase().includes(busca));
            }

            if (periodoDe) {
                const inicio = new Date(periodoDe + 'T00:00:00');
                filtrados = filtrados.filter(pv => dataLocal(pv.created_at) >= inicio);
            }

            if (periodoAte) {
                const fim = new Date(periodoAte + 'T23:59:59');
                filtrados = filtrados.filter(pv => dataLocal(pv.created_at) <= fim);
            }

            renderizarPosVendas(filtrados);
        }

        function editarPosVenda(id) {
            window.location.href = `editar-posvenda.html?id=${id}`;
        }

        function renderizarPosVendas(posvendas) {
            const tabela = document.getElementById('tabela-posvendas');
            tabela.innerHTML = '';

            if (posvendas.length === 0) {
                tabela.innerHTML = '<tr><td colspan="5" style="text-align:center">Nenhum pós-venda encontrado</td></tr>';
                return;
            }

            posvendas.forEach(pv => {
                const nomeCliente = pv.cliente_nome || `ID ${pv.cliente_id}`;
                const row = document.createElement('tr');

                const badges = {
                    'pendente': 'badge badge-warning',
                    'em andamento': 'badge badge-info',
                    'concluido': 'badge badge-success'
                };
                const badgeClass = badges[pv.status] || 'badge';

                row.innerHTML = `
            <td data-label="Cliente">${nomeCliente}</td>
            <td data-label="Status"><span class="${badgeClass}">${pv.status}</span></td>
            <td data-label="Data de Retorno">${pv.data_retorno ? new Date(pv.data_retorno).toLocaleDateString('pt-BR') : '--'}</td>
            <td data-label="Feedback">${pv.feedback || '--'}</td>
            <td data-label="Ações">
               <button class="btn-ver" onclick="verCliente(${pv.cliente_id})">Ver</button>
                <button class="btn-editar" onclick="abrirModalDetalhes(${pv.id})">Detalhes</button>
                <button class="btn-editar" onclick="editarPosVenda(${pv.id})">Editar</button>
                <button class="btn-deletar" onclick="deletarPosVenda(${pv.id})">Excluir</button>
            </td>
        `;
                tabela.appendChild(row);
            });
        }

        function verCliente(clienteId) {
            window.location.href = `historico.html?id=${clienteId}`;
        }

        let posVendaAtual = null;

        async function abrirModalDetalhes(id) {
            const pv = todosPosVendas.find(p => p.id === id);
            if (!pv) return;
            posVendaAtual = pv;

            document.getElementById('modal-titulo').textContent = pv.cliente_nome || `Cliente ID ${pv.cliente_id}`;
            document.getElementById('modal-subtitulo').textContent = `Pós-venda cadastrado em ${dataLocal(pv.created_at).toLocaleDateString('pt-BR')}`;
            document.getElementById('modal-observacoes').value = pv.observacoes || '';

            const comentariosDiv = document.getElementById('modal-comentarios');
            comentariosDiv.innerHTML = '<p style="color:#888; font-size:13px;">Carregando...</p>';
            document.getElementById('modal-detalhes').classList.add('ativa');

            const response = await fetch(`/avaliacoes/${pv.cliente_id}`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });

            if (!response.ok) {
                comentariosDiv.innerHTML = '<p style="color:#888; font-size:13px;">Erro ao carregar comentários.</p>';
                return;
            }

            const avaliacoes = await response.json();
            const comComentario = avaliacoes.filter(a => a.o_que_gostou || a.o_que_melhorar || a.consideracoes);

            if (comComentario.length === 0) {
                comentariosDiv.innerHTML = '<p style="color:#888; font-size:13px;">Este cliente não deixou comentários nas avaliações.</p>';
                return;
            }

            comentariosDiv.innerHTML = comComentario.slice().reverse().map(a => `
                <div class="comentario-item">
                    <div class="data">${dataLocal(a.created_at).toLocaleDateString('pt-BR')}</div>
                    ${a.o_que_gostou ? `<p><strong>Gostou:</strong> ${a.o_que_gostou}</p>` : ''}
                    ${a.o_que_melhorar ? `<p><strong>Melhorar:</strong> ${a.o_que_melhorar}</p>` : ''}
                    ${a.consideracoes ? `<p><strong>Considerações:</strong> ${a.consideracoes}</p>` : ''}
                </div>
            `).join('');
        }

        function fecharModalDetalhes() {
            document.getElementById('modal-detalhes').classList.remove('ativa');
            posVendaAtual = null;
        }

        async function salvarObservacoes() {
            if (!posVendaAtual) return;
            const observacoes = document.getElementById('modal-observacoes').value || null;

            const response = await fetch(`/pos-venda/${posVendaAtual.id}`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({
                    cliente_id: posVendaAtual.cliente_id,
                    feedback: posVendaAtual.feedback,
                    status: posVendaAtual.status,
                    data_retorno: posVendaAtual.data_retorno,
                    observacoes
                })
            });

            if (response.ok) {
                toast('Observações salvas com sucesso!');
                fecharModalDetalhes();
                carregarPosVendas();
            } else {
                toast('Erro ao salvar observações!', 'erro');
            }
        }

        function novoPosVendas() {
            window.location.href = 'novo-posvendas.html';
        }

        function logout() {
            localStorage.removeItem('token');
            window.location.href = 'index.html';
        }

        carregarPosVendas();
    </script>
</body>

</html>
