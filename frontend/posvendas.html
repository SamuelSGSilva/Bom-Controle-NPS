<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pós-Vendas</title>
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <script src="toast.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: #0a0a0a;
            color: #f1f1f1;
            min-height: 100vh;
        }

        header {
            background: #141414;
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #cc0000;
        }

        header button {
            background: transparent;
            border: 1px solid #cc0000;
            color: #cc0000;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }

        header button:hover {
            background: #cc0000;
            color: #fff;
        }

        main {
            padding: 32px;
        }

        h2 {
            margin-bottom: 20px;
            font-size: 18px;
            color: #ffffff;
        }

        table {
            width: 100%;
            min-width: 700px;
            border-collapse: collapse;
            table-layout: fixed;
        }

        thead th {
            background: #cc0000;
            color: #fff;
            padding: 12px 16px;
            text-align: left;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        thead th:nth-child(1) { width: 16%; }
        thead th:nth-child(2) { width: 12%; }
        thead th:nth-child(3) { width: 14%; }
        thead th:nth-child(4) { width: 42%; }
        thead th:nth-child(5) { width: 16%; }

        tbody tr {
            border-bottom: 1px solid #2a2a2a;
            transition: background 0.2s;
        }

        tbody tr:hover {
            background: #1a1a1a;
        }

        tbody td {
            padding: 12px 16px;
            font-size: 14px;
            color: #cccccc;
            word-break: break-word;
        }

        tbody td:last-child {
            white-space: nowrap;
        }

        .btn-ver {
            background: transparent;
            border: 1px solid #cc0000;
            color: #cc0000;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }

        .btn-ver:hover {
            background: #cc0000;
            color: #fff;
        }

        nav {
            display: flex;
            gap: 24px;
        }

        nav a {
            color: #888888;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s;
        }

        nav a:hover {
            color: #cc0000;
        }

        nav a.ativo {
            color: #cc0000;
            font-weight: 600;
        }

        .btn-novo {
            background: #cc0000;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: background 0.2s;
        }

        .btn-novo:hover {
            background: #aa0000;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #2a2a2a;
            border-top: 4px solid #cc0000;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .btn-deletar {
            background: transparent;
            border: 1px solid #888888;
            color: #888888;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            margin-left: 6px;
            transition: all 0.2s;
        }

        .btn-deletar:hover {
            border-color: #cc0000;
            color: #cc0000;
        }

        .btn-editar {
            background: transparent;
            border: 1px solid #38bdf8;
            color: #38bdf8;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            margin-left: 6px;
            transition: all 0.2s;
        }

        .btn-editar:hover {
            background: #38bdf8;
            color: #0a0a0a;
        }

        .autocomplete-wrapper {
            position: relative;
            flex: 1 1 220px;
            min-width: 220px;
        }

        .autocomplete-wrapper input {
            width: 100%;
        }

        .autocomplete-lista {
            display: none;
            position: absolute;
            top: calc(100% + 4px);
            left: 0;
            right: 0;
            background: #141414;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            max-height: 220px;
            overflow-y: auto;
            z-index: 10;
        }

        .autocomplete-item {
            padding: 10px 14px;
            cursor: pointer;
            font-size: 14px;
            color: #f1f1f1;
            border-bottom: 1px solid #1a1a1a;
        }

        .autocomplete-item:last-child {
            border-bottom: none;
        }

        .autocomplete-item span {
            display: block;
            font-size: 12px;
            color: #888888;
        }

        .autocomplete-item:hover,
        .autocomplete-item.ativo {
            background: #1a1a1a;
        }
    </style>
    <link rel="stylesheet" href="responsive.css">
</head>

<body>
    <header>
        <img src="assets/logo.png" style="height: 40px;">
        <nav>
            <a href="dashboard.html">Dashboard</a>
            <a href="clientes.html">Clientes</a>
            <a href="posvendas.html" class="ativo">Pós-venda</a>
            <a href="relatorios.html">Relatórios</a>
            <a href="avaliacao-completa.html">Avaliações</a>
             <a href="importar.html">Importar</a>
        </nav>
        <button onclick="logout()"> Sair</button>
    </header>

    <main>
        <div style="display: flex; flex-wrap: wrap; row-gap: 12px; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <div style="display: flex; flex-wrap: wrap; row-gap: 12px; gap: 12px;">
                <div class="autocomplete-wrapper">
                    <input type="text" id="busca-cliente" placeholder="Buscar por cliente..." autocomplete="off"
                        style="padding: 10px 16px; background: #141414; border: 1px solid #2a2a2a; border-radius: 8px; color: #f1f1f1; font-size: 14px; outline: none;">
                    <div class="autocomplete-lista" id="lista-sugestoes-busca"></div>
                </div>
                <select id="filtro-status" onchange="aplicarFiltros()"
                    style="padding: 10px 16px; background: #141414; border: 1px solid #2a2a2a; border-radius: 8px; color: #f1f1f1; font-size: 14px; outline: none; cursor: pointer;">
                    <option value="">Todos</option>
                    <option value="pendente">Pendente</option>
                    <option value="em andamento">Em Andamento</option>
                    <option value="concluido">Concluído</option>
                </select>
                <button class="btn-novo" onclick="novoPosVendas()">+ Novo Pós-Vendas</button>
                <button class="btn-editar" id="btn-ver-excluidos" onclick="alternarExcluidos()">Ver Excluídos</button>
            </div>
            <div id="loading" style="text-align: center; padding: 40px; display: none;">
                <div class="spinner"></div>
                <p style="color: #888888; margin-top: 12px;">Carregando...</p>
            </div>
        </div>
        <div class="table-container" id="container-posvendas">
            <table>
                <thead>
                    <tr>
                        <th>Cliente</th>
                        <th>Status</th>
                        <th>Data de Retorno</th>
                        <th>Feedback</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="tabela-posvendas"></tbody>
            </table>
        </div>
        <div class="table-container" id="container-excluidos" style="display: none;">
            <h2>Pós-vendas excluídos</h2>
            <table>
                <thead>
                    <tr>
                        <th>Cliente</th>
                        <th>Status</th>
                        <th>Feedback</th>
                        <th>Excluído por</th>
                        <th>Quando</th>
                    </tr>
                </thead>
                <tbody id="tabela-excluidos"></tbody>
            </table>
        </div>
    </main>

    <script>
        const token = localStorage.getItem('token');
        if (!token) window.location.href = 'index.html';

        let todosPosVendas = [];
        let todosClientesPV = [];

        async function carregarPosVendas() {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('tabela-posvendas').innerHTML = '';

            const [resPV, resCli] = await Promise.all([
                fetch('/pos-venda', { headers: { 'Authorization': `Bearer ${token}` } }),
                fetch('/clientes', { headers: { 'Authorization': `Bearer ${token}` } })
            ]);

            document.getElementById('loading').style.display = 'none';

            if (resPV.status === 401 || resCli.status === 401) {
                localStorage.removeItem('token');
                window.location.href = 'index.html';
                return;
            }

            if (!resPV.ok || !resCli.ok) {
                toast('Erro ao carregar pós-vendas!', 'erro');
                return;
            }

            todosPosVendas = await resPV.json();
            todosClientesPV = await resCli.json();
            renderizarPosVendas(todosPosVendas);
        }

        let mostrandoExcluidos = false;

        async function alternarExcluidos() {
            mostrandoExcluidos = !mostrandoExcluidos;
            document.getElementById('container-posvendas').style.display = mostrandoExcluidos ? 'none' : 'block';
            document.getElementById('container-excluidos').style.display = mostrandoExcluidos ? 'block' : 'none';
            document.getElementById('btn-ver-excluidos').textContent = mostrandoExcluidos ? 'Voltar' : 'Ver Excluídos';

            if (mostrandoExcluidos) {
                await carregarExcluidos();
            }
        }

        async function carregarExcluidos() {
            const tabela = document.getElementById('tabela-excluidos');
            tabela.innerHTML = '';

            const response = await fetch('/logs-auditoria?entidade=pos_venda', {
                headers: { 'Authorization': `Bearer ${token}` }
            });

            if (!response.ok) {
                toast('Erro ao carregar pós-vendas excluídos!', 'erro');
                return;
            }

            const logs = await response.json();

            if (logs.length === 0) {
                tabela.innerHTML = '<tr><td colspan="5" style="text-align:center">Nenhum pós-venda excluído</td></tr>';
                return;
            }

            logs.forEach(log => {
                const dados = JSON.parse(log.dados_antes);
                const nomeCliente = dados.cliente_nome || `ID ${dados.cliente_id}`;
                const quando = new Date(log.created_at).toLocaleString('pt-BR');
                tabela.innerHTML += `
            <tr>
                <td data-label="Cliente">${nomeCliente}</td>
                <td data-label="Status">${dados.status || '--'}</td>
                <td data-label="Feedback">${dados.feedback || '--'}</td>
                <td data-label="Excluído por">${log.usuario || '--'}</td>
                <td data-label="Quando">${quando}</td>
            </tr>`;
            });
        }

        async function deletarPosVenda(id) {
            if (!confirm('Tem certeza que deseja excluir este pós-venda?')) return;

            const response = await fetch(`/pos-venda/${id}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${token}` }
            });

            if (response.ok) {
                toast('Pós-venda excluído com sucesso!');
                carregarPosVendas();
            } else {
                toast('Erro ao excluir pós-venda!', 'erro');
            }
        }

        const inputBusca = document.getElementById('busca-cliente');
        const listaSugestoesBusca = document.getElementById('lista-sugestoes-busca');
        let sugestoesBusca = [];

        function esconderSugestoesBusca() {
            listaSugestoesBusca.style.display = 'none';
            listaSugestoesBusca.innerHTML = '';
            sugestoesBusca = [];
        }

        function renderizarSugestoesBusca(texto) {
            const nomesUnicos = new Set();
            sugestoesBusca = todosClientesPV.filter(c => {
                const nome = c.nome.toLowerCase();
                if (!nome.includes(texto.toLowerCase()) || nomesUnicos.has(nome)) return false;
                nomesUnicos.add(nome);
                return true;
            }).slice(0, 8);

            if (sugestoesBusca.length === 0) {
                esconderSugestoesBusca();
                return;
            }

            listaSugestoesBusca.innerHTML = sugestoesBusca.map((c, i) => `
                <div class="autocomplete-item" data-indice="${i}">${c.nome}</div>
            `).join('');
            listaSugestoesBusca.style.display = 'block';

            listaSugestoesBusca.querySelectorAll('.autocomplete-item').forEach(item => {
                item.addEventListener('mousedown', function (e) {
                    e.preventDefault();
                    const cliente = sugestoesBusca[Number(item.dataset.indice)];
                    inputBusca.value = cliente.nome;
                    esconderSugestoesBusca();
                    aplicarFiltros();
                });
            });
        }

        inputBusca.addEventListener('input', function () {
            const texto = inputBusca.value.trim();
            aplicarFiltros();
            if (texto) {
                renderizarSugestoesBusca(texto);
            } else {
                esconderSugestoesBusca();
            }
        });

        inputBusca.addEventListener('blur', esconderSugestoesBusca);

        function aplicarFiltros() {
            const status = document.getElementById('filtro-status').value;
            const busca = document.getElementById('busca-cliente').value.trim().toLowerCase();

            let filtrados = todosPosVendas;

            if (status) {
                filtrados = filtrados.filter(pv => pv.status === status);
            }

            if (busca) {
                filtrados = filtrados.filter(pv => (pv.cliente_nome || '').toLowerCase().includes(busca));
            }

            renderizarPosVendas(filtrados);
        }

        function editarPosVenda(id) {
            window.location.href = `editar-posvenda.html?id=${id}`;
        }

        function renderizarPosVendas(posvendas) {
            const tabela = document.getElementById('tabela-posvendas');
            tabela.innerHTML = '';

            if (posvendas.length === 0) {
                tabela.innerHTML = '<tr><td colspan="5" style="text-align:center">Nenhum pós-venda encontrado</td></tr>';
                return;
            }

            posvendas.forEach(pv => {
                const nomeCliente = pv.cliente_nome || `ID ${pv.cliente_id}`;
                const row = document.createElement('tr');

                const cores = {
                    'pendente': '#f59e0b',
                    'em andamento': '#38bdf8',
                    'concluido': '#00cc66'
                };
                const cor = cores[pv.status] || '#888888';

                row.innerHTML = `
            <td data-label="Cliente">${nomeCliente}</td>
            <td data-label="Status"><span style="color: ${cor}; font-weight: 600;">● ${pv.status}</span></td>
            <td data-label="Data de Retorno">${pv.data_retorno ? new Date(pv.data_retorno).toLocaleDateString('pt-BR') : '--'}</td>
            <td data-label="Feedback">${pv.feedback || '--'}</td>
            <td data-label="Ações">
               <button class="btn-ver" onclick="verCliente(${pv.cliente_id})">Ver</button>
                <button class="btn-editar" onclick="editarPosVenda(${pv.id})">Editar</button>
                <button class="btn-deletar" onclick="deletarPosVenda(${pv.id})">Excluir</button>
            </td>
        `;
                tabela.appendChild(row);
            });
        }

        function verCliente(clienteId) {
            window.location.href = `historico.html?id=${clienteId}`;
        }

        function novoPosVendas() {
            window.location.href = 'novo-posvendas.html';
        }

        function logout() {
            localStorage.removeItem('token');
            window.location.href = 'index.html';
        }

        carregarPosVendas();
    </script>
</body>

</html>
